name: 시간표 자동 갱신

on:
  schedule:
    # UTC 기준. KST(UTC+9)로 06,09,12,15,18시 → 21,0,3,6,9 UTC
    - cron: '0 21 * * *'
    - cron: '0 0,3,6,9 * * *'
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 컴시간 데이터 수집
        run: python fetch_comci.py

      - name: 변경사항 커밋
        run: |
          git config user.name "timetable-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet || git commit -m "시간표 데이터 갱신"
          git push
