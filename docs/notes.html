<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="쌤노트">
<meta name="theme-color" content="#111418">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>쌤노트 · SsamNote</title>
<style>
  :root{
    --bg:#e9edf2; --panel:#ffffff; --panel2:#f4f6f9; --line:#dfe4ea;
    --ink:#1c2530; --muted:#8a94a3; --accent:#0a84ff; --accent2:#0060df;
    --danger:#ff3b30; --shadow:0 10px 30px rgba(20,30,50,.12);
    --tool:#20262e; --toolink:#eef2f7;
    --paper:#ffffff; --pagebg:#c9d1db;
  }
  html[data-theme="dark"]{
    --bg:#0f1216; --panel:#1a1f26; --panel2:#232a33; --line:#2c333d;
    --ink:#e8edf3; --muted:#8b96a5; --accent:#0a84ff; --accent2:#409cff;
    --shadow:0 10px 30px rgba(0,0,0,.45);
    --tool:#0c0f13; --toolink:#e8edf3;
    --paper:#20262e; --pagebg:#0a0d11;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;
       background:var(--bg);color:var(--ink);overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  .hidden{display:none!important}

  /* ---------- 공통 상단 바 ---------- */
  .topbar{height:56px;display:flex;align-items:center;gap:8px;padding:0 12px;
          background:var(--panel);border-bottom:1px solid var(--line);position:relative;z-index:30}
  .topbar .grow{flex:1;min-width:0}
  .tbtn{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
        color:var(--ink);font-size:19px;transition:background .12s}
  .tbtn:hover{background:var(--panel2)}
  .tbtn.on{background:var(--accent);color:#fff}
  .tbtn:disabled{opacity:.3;cursor:default}
  .title-in{font-size:16px;font-weight:600;color:var(--ink);background:transparent;border:0;outline:0;width:100%;
            padding:6px 8px;border-radius:8px}
  .title-in:focus{background:var(--panel2)}
  .brand{font-weight:800;font-size:17px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#0a84ff,#5e5ce6);
               display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
  .pageind{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:52px;text-align:center}

  /* ---------- 서재(라이브러리) ---------- */
  #library{position:absolute;inset:56px 0 0 0;overflow:auto;padding:22px;-webkit-overflow-scrolling:touch}
  .shelf-head{max-width:1100px;margin:0 auto 18px;display:flex;align-items:center;gap:12px}
  .shelf-head h2{margin:0;font-size:22px;font-weight:800;letter-spacing:-.4px}
  .shelf-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .grid{max-width:1100px;margin:0 auto;display:grid;gap:22px;
        grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .card{cursor:pointer}
  .cover{aspect-ratio:3/4;border-radius:12px;box-shadow:var(--shadow);position:relative;overflow:hidden;
         display:flex;flex-direction:column;justify-content:flex-end;transition:transform .12s}
  .card:hover .cover{transform:translateY(-3px)}
  .cover .spine{position:absolute;left:0;top:0;bottom:0;width:9px;background:rgba(0,0,0,.14)}
  .cover .ct{padding:12px 12px 14px;color:#fff}
  .cover .ct .t{font-weight:700;font-size:14px;line-height:1.25;text-shadow:0 1px 2px rgba(0,0,0,.25);
                display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .cover .ct .m{font-size:11px;opacity:.85;margin-top:4px}
  .cover.new{background:var(--panel);border:2px dashed var(--line);box-shadow:none;color:var(--muted);
             align-items:center;justify-content:center;flex-direction:column;gap:8px}
  .cover.new .plus{font-size:34px;line-height:1}
  .card .cap{margin-top:9px;font-size:13px;font-weight:600;text-align:center;color:var(--ink);
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
  .card .cap small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:1px}

  /* ---------- 에디터 ---------- */
  #editor{position:absolute;inset:0;display:flex;flex-direction:column}
  #stage{flex:1;position:relative;overflow:hidden;background:var(--pagebg);touch-action:none}
  #board{position:absolute;inset:0;display:block}
  .empty-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
              pointer-events:none;color:#fff;opacity:.0}

  /* 상단 도구 리본 (GoodNotes 스타일) */
  .ribbon{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--panel);
          border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden;position:relative;z-index:29;
          scrollbar-width:none}
  .ribbon::-webkit-scrollbar{display:none}
  .rgroup{display:flex;align-items:center;gap:3px;flex:0 0 auto}
  .rsep{width:1px;height:24px;background:var(--line);flex:0 0 auto;margin:0 4px}
  .rtool{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
         font-size:18px;color:var(--ink);flex:0 0 auto;position:relative;transition:background .12s}
  .rtool:hover{background:var(--panel2)}
  .rtool.on{background:var(--panel2)}
  .rtool.on::after{content:'';position:absolute;left:7px;right:7px;bottom:3px;height:3px;border-radius:2px;
                   background:var(--tool-color,var(--accent))}
  .rtool:disabled{opacity:.28;cursor:default}
  .zoomg{margin-left:auto;padding-left:6px}
  .rtool.zlabel{width:auto;min-width:52px;font-size:13px;font-weight:600;color:var(--muted);padding:0 6px}
  .swatch{width:24px;height:24px;border-radius:50%;border:2px solid rgba(0,0,0,.16);cursor:pointer;
          flex:0 0 auto;transition:transform .1s}
  html[data-theme="dark"] .swatch{border-color:rgba(255,255,255,.22)}
  .swatch.on{transform:scale(1.16);box-shadow:0 0 0 2px var(--panel),0 0 0 4px var(--accent)}
  .colors{display:flex;gap:6px;align-items:center;padding:0 2px;flex:0 0 auto}
  .sizes{display:flex;gap:4px;align-items:center;padding:0 2px;flex:0 0 auto}
  .sizedot{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
           color:var(--ink)}
  .sizedot.on{background:var(--panel2)}
  .sizedot.on i{background:var(--accent)}
  .sizedot i{display:block;border-radius:50%;background:currentColor}

  /* 도구 옵션 팝오버 (도구 재탭 시) */
  .toolpop{position:absolute;top:150px;z-index:44;background:var(--panel);border:1px solid var(--line);
           border-radius:16px;box-shadow:var(--shadow);padding:14px;width:260px;max-width:92vw}
  .toolpop h4{margin:0 0 9px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .toolpop .palette{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:14px}
  .toolpop .palette .swatch{width:28px;height:28px}
  .toolpop .slider{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .toolpop input[type=range]{flex:1;accent-color:var(--accent)}
  .toolpop .prev{width:40px;text-align:center;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .toolpop .kinds{display:flex;gap:8px;margin-bottom:14px}
  .toolpop .kind{flex:1;height:44px;border:1.5px solid var(--line);border-radius:11px;display:flex;
                 align-items:center;justify-content:center;font-size:20px;color:var(--ink)}
  .toolpop .kind.on{border-color:var(--accent);color:var(--accent);background:var(--panel2)}
  .toolpop .custom{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
  .toolpop .custom input[type=color]{width:34px;height:26px;border:1px solid var(--line);border-radius:6px;background:none;padding:0}

  /* 팝오버(옵션 패널) */
  .pop{position:absolute;bottom:74px;left:50%;transform:translateX(-50%);z-index:45;
       background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
       padding:14px;min-width:240px;max-width:min(92vw,340px)}
  .pop h4{margin:0 0 10px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .pop .prow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .pop .prow:last-child{margin-bottom:0}
  .chip{padding:8px 12px;border-radius:10px;background:var(--panel2);font-size:13px;font-weight:600;
        border:1.5px solid transparent;display:flex;align-items:center;gap:6px}
  .chip.on{border-color:var(--accent);color:var(--accent)}
  .chip .tpl{width:34px;height:24px;border-radius:4px;background:#fff;border:1px solid var(--line);position:relative;overflow:hidden}

  /* 페이지 썸네일 사이드 */
  #pages{position:absolute;top:0;right:0;bottom:0;width:170px;z-index:26;background:var(--panel);
         border-left:1px solid var(--line);box-shadow:-8px 0 30px rgba(0,0,0,.12);
         transform:translateX(100%);transition:transform .22s;display:flex;flex-direction:column}
  #pages.open{transform:none}
  #pages .ph{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:14px;
             display:flex;align-items:center;justify-content:space-between}
  #pages .plist{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
  .thumb{border:2px solid transparent;border-radius:8px;overflow:hidden;position:relative;background:#fff;
         box-shadow:0 2px 8px rgba(0,0,0,.12);cursor:pointer}
  .thumb.on{border-color:var(--accent)}
  .thumb canvas{display:block;width:100%}
  .thumb .n{position:absolute;left:6px;bottom:5px;font-size:11px;color:#333;background:rgba(255,255,255,.8);
            border-radius:5px;padding:0 5px;font-weight:600}
  .thumb .del{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.5);
              color:#fff;font-size:13px;display:none;align-items:center;justify-content:center}
  .thumb:hover .del{display:flex}
  #pages .addp{margin:12px;padding:12px;border:2px dashed var(--line);border-radius:10px;color:var(--muted);
               font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px}

  /* 손글씨 변환 팝업 */
  #convpop{position:fixed;z-index:55;left:50%;top:50%;transform:translate(-50%,-50%);
           width:min(420px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:18px;
           box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:12px}
  #convpop .cvh{display:flex;align-items:center;justify-content:space-between;font-size:16px}
  #convpop .cvlang{display:flex;gap:4px;background:var(--panel2);padding:3px;border-radius:9px}
  #convpop .cvlang button{padding:5px 12px;border-radius:7px;font-size:13px;font-weight:600;color:var(--muted)}
  #convpop .cvlang button.on{background:var(--accent);color:#fff}
  #convpop .cvbody{min-height:70px;max-height:180px;overflow:auto;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start}
  #convpop .cvchip{padding:9px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:16px;background:var(--panel2)}
  #convpop .cvchip.on{border-color:var(--accent);color:var(--accent)}
  #convpop .cvspin,#convpop .cvmsg{color:var(--muted);font-size:14px;padding:16px 4px;width:100%;text-align:center}
  #convpop .cvmsg{line-height:1.5}
  #convpop .cvsec{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.4px;margin:2px 2px 0}
  #convpop .cvedit textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;
           font-size:16px;background:var(--panel2);color:var(--ink);resize:none;font-family:inherit;line-height:1.35}
  #convpop .cvfoot{display:flex;gap:8px;justify-content:flex-end}
  #convpop .cvfoot button{padding:9px 18px;border-radius:11px;font-size:14px;font-weight:600;background:var(--panel2);color:var(--ink)}
  #convpop .cvfoot button.prim{background:var(--accent);color:#fff}

  /* 새 노트 만들기 다이얼로그 */
  #newpop{position:fixed;z-index:55;left:50%;top:50%;transform:translate(-50%,-50%);
          width:min(560px,94vw);max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);
          border-radius:20px;box-shadow:var(--shadow);padding:20px}
  #newpop .nnh{font-size:18px;font-weight:800;margin-bottom:14px}
  #newpop .nninput{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;
          font-weight:600;background:var(--panel2);color:var(--ink);margin-bottom:16px}
  #newpop .nnsec{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;
          margin:0 2px 10px;display:flex;align-items:center;gap:8px}
  #newpop .nnsec span{background:var(--panel2);border-radius:8px;padding:1px 7px;font-size:11px}
  #newpop .nngrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px;margin-bottom:18px}
  #newpop .nntile{border:2px solid transparent;border-radius:12px;padding:6px;background:var(--panel2);
          display:flex;flex-direction:column;align-items:center;gap:6px;transition:.12s}
  #newpop .nntile:hover{background:var(--line)}
  #newpop .nntile.on{border-color:var(--accent);background:var(--panel2)}
  #newpop .nntile canvas{width:100%;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.14)}
  #newpop .nnlb{text-align:center;line-height:1.25}
  #newpop .nnlb b{display:block;font-size:12.5px}
  #newpop .nnlb span{font-size:10.5px;color:var(--muted)}
  #newpop .nnpaper{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  #newpop .nnpchip{display:flex;align-items:center;gap:7px;padding:8px 12px;border:1.5px solid var(--line);
          border-radius:11px;font-size:13px;font-weight:600;color:var(--ink)}
  #newpop .nnpchip.on{border-color:var(--accent);color:var(--accent)}
  #newpop .nnpchip .sw{width:18px;height:18px;border-radius:5px;border:1px solid rgba(0,0,0,.15)}
  #newpop .nncov{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
  #newpop .nncdot{width:34px;height:34px;border-radius:9px;cursor:pointer;border:2px solid transparent}
  #newpop .nncdot.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--panel),0 0 0 4px var(--accent)}
  #newpop .cvfoot{display:flex;gap:8px;justify-content:flex-end}
  #newpop .cvfoot button{padding:11px 22px;border-radius:12px;font-size:15px;font-weight:700;background:var(--panel2);color:var(--ink)}
  #newpop .cvfoot button.prim{background:var(--accent);color:#fff}

  /* ===== GoodNotes 스타일 상단 크롬 ===== */
  :root{--gn-blue:#48609f;--gn-blue-d:#3d5390;--gn-tabbg:#e7e5d6;}
  html[data-theme="dark"]{--gn-blue:#3a4c85;--gn-blue-d:#31406f;--gn-tabbg:#20262e;}
  .gntabs{display:flex;align-items:center;gap:3px;height:44px;padding:0 8px;background:var(--gn-blue-d)}
  .gnhome{width:36px;height:36px;color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;border-radius:9px;flex:0 0 auto}
  .gnhome:hover{background:rgba(255,255,255,.15)}
  .tabstrip{display:flex;align-items:flex-end;gap:3px;flex:1;overflow-x:auto;height:100%;scrollbar-width:none;padding-top:8px}
  .tabstrip::-webkit-scrollbar{display:none}
  .gtab{display:flex;align-items:center;gap:8px;padding:0 8px 0 14px;height:34px;border-radius:10px 10px 0 0;
        background:rgba(255,255,255,.16);color:#eef1f9;font-size:13px;font-weight:600;white-space:nowrap;
        max-width:190px;flex:0 0 auto;cursor:pointer}
  .gtab.on{background:var(--panel);color:var(--ink)}
  .gtab .tx{overflow:hidden;text-overflow:ellipsis;max-width:150px}
  .gtab .cl{width:19px;height:19px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.65}
  .gtab .cl:hover{background:rgba(0,0,0,.16);opacity:1}
  .gntadd{width:32px;height:32px;color:#fff;font-size:19px;border-radius:9px;flex:0 0 auto}
  .gntadd:hover{background:rgba(255,255,255,.15)}

  .gnbar{display:flex;align-items:center;gap:3px;height:52px;padding:0 10px;background:var(--gn-blue);
         overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
  .gnbar::-webkit-scrollbar{display:none}
  .gnbar .gnicon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
         color:#fff;font-size:19px;flex:0 0 auto}
  .gnbar .gnicon:hover{background:rgba(255,255,255,.15)}
  .gnbar .rtool{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
         color:#fff;font-size:20px;flex:0 0 auto;position:relative}
  .gnbar .rtool:hover{background:rgba(255,255,255,.15)}
  .gnbar .rtool.on{background:#fff;color:var(--gn-blue)}
  .gnbar .rtool.on::after{content:'';position:absolute;left:9px;right:9px;bottom:4px;height:3px;border-radius:2px;background:var(--tool-color,var(--gn-blue))}
  .gnsep{width:1px;height:26px;background:rgba(255,255,255,.28);margin:0 5px;flex:0 0 auto}
  .gngrow{flex:1;min-width:6px}

  .gnsub{display:flex;align-items:center;gap:8px;height:46px;padding:0 12px;background:var(--panel2);
         border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
  .gnsub::-webkit-scrollbar{display:none}
  .undopill{display:flex;background:var(--panel);border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.14);overflow:hidden;flex:0 0 auto}
  .undopill button{width:42px;height:34px;color:var(--ink);font-size:17px;display:flex;align-items:center;justify-content:center}
  .undopill button:hover{background:var(--panel2)}
  .undopill button:disabled{opacity:.3}
  .gnsep2{width:1px;height:22px;background:var(--line);flex:0 0 auto}
  .zoomg2{display:flex;align-items:center;gap:2px;flex:0 0 auto}
  .gnz{height:34px;min-width:34px;border-radius:9px;color:var(--ink);font-size:15px;display:flex;align-items:center;justify-content:center;padding:0 6px}
  .gnz:hover{background:var(--panel)}
  .gnz.zlabel{font-weight:700;font-size:13px;color:var(--muted);min-width:52px}

  /* 드롭다운 메뉴 */
  .menu{position:absolute;top:100px;right:12px;z-index:40;background:var(--panel);border:1px solid var(--line);
        border-radius:14px;box-shadow:var(--shadow);padding:6px;min-width:210px}
  .menu button{display:flex;align-items:center;gap:11px;width:100%;padding:10px 12px;border-radius:9px;
               font-size:14px;font-weight:500;text-align:left}
  .menu button:hover{background:var(--panel2)}
  .menu button .ic{width:20px;text-align:center;font-size:16px}
  .menu .div{height:1px;background:var(--line);margin:5px 4px}
  .menu button.danger{color:var(--danger)}

  /* 텍스트 편집 오버레이 */
  #tedit{position:absolute;z-index:35;background:transparent;border:1.5px solid var(--accent);border-radius:4px;
         outline:0;resize:none;overflow:hidden;line-height:1.3;padding:2px 4px;white-space:pre;
         box-shadow:0 0 0 3px rgba(10,132,255,.15)}

  /* 선택(올가미) 플로팅 액션 */
  #selbar{position:absolute;z-index:24;background:var(--tool);border-radius:12px;box-shadow:var(--shadow);
          display:flex;gap:2px;padding:5px}
  #selbar button{padding:8px 12px;border-radius:8px;color:var(--toolink);font-size:13px;font-weight:600;display:flex;gap:6px;align-items:center}
  #selbar button:hover{background:rgba(255,255,255,.1)}
  #selbar button.danger{color:#ff6b63}
  /* 텍스트 글상자 서식 툴바 */
  #txtbar{position:absolute;z-index:25;background:var(--panel);border:1px solid var(--line);border-radius:13px;
          box-shadow:var(--shadow);display:flex;gap:1px;padding:5px;align-items:center}
  #txtbar button{min-width:34px;height:34px;padding:0 8px;border-radius:9px;color:var(--ink);font-size:15px;
          display:flex;gap:4px;align-items:center;justify-content:center;white-space:nowrap}
  #txtbar button:hover{background:var(--panel2)}
  #txtbar button.act{background:var(--accent);color:#fff}
  #txtbar button.danger{color:var(--danger)}
  #txtbar .tbsize{min-width:26px;text-align:center;font-size:13px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
  #txtbar .tbsep{width:1px;height:22px;background:var(--line);margin:0 3px}
  #txtbar .cdot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:block}
  #txtcolpop{position:absolute;z-index:26;background:var(--panel);border:1px solid var(--line);border-radius:12px;
             box-shadow:var(--shadow);padding:10px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;width:216px}
  #txtcolpop .swatch{width:26px;height:26px}

  .toast{position:absolute;bottom:84px;left:50%;transform:translateX(-50%);z-index:60;
         background:var(--tool);color:var(--toolink);padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;
         box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  .backdrop{position:absolute;inset:0;z-index:38}

  @media (max-width:560px){
    .rtool{width:36px;height:36px;font-size:17px}
    .swatch{width:22px;height:22px}
    #library{padding:16px}
    .grid{gap:16px;grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  }
</style></head>
<body>

<!-- ===== 서재 뷰 ===== -->
<div id="libbar" class="topbar">
  <div class="brand"><span class="logo">✎</span><span>쌤노트</span></div>
  <div class="grow"></div>
  <button class="tbtn" id="themeBtn" title="테마">◐</button>
</div>
<div id="library"></div>

<!-- ===== 에디터 뷰 ===== -->
<div id="editor" class="hidden">
  <!-- 문서 탭 바 -->
  <div class="gntabs">
    <button class="gnhome" id="backBtn" title="서재">🏠</button>
    <div class="tabstrip" id="tabstrip"></div>
    <button class="gntadd" id="newTabBtn" title="새 노트">＋</button>
  </div>

  <!-- 파란 도구 바 -->
  <div class="gnbar">
    <button class="gnicon" id="pagesBtn" title="페이지">▦</button>
    <span class="gnsep"></span>
    <div class="rgroup" id="toolset" style="display:flex">
      <button class="rtool on" data-tool="pen" title="펜 (1)">🖊️</button>
      <button class="rtool" data-tool="highlighter" title="형광펜 (2)">🖍️</button>
      <button class="rtool" data-tool="eraser" title="지우개 (3)">🩹</button>
      <button class="rtool" data-tool="shape" title="도형 (4)">▱</button>
      <button class="rtool" data-tool="lasso" title="올가미 선택 (5)">◌</button>
      <button class="rtool" data-tool="text" title="텍스트 (6)">🅣</button>
      <button class="rtool" data-tool="pan" title="이동/확대 (7)">✋</button>
    </div>
    <span class="gngrow"></span>
    <button class="gnicon" id="addPageBtn2" title="페이지 추가">⊕</button>
    <button class="gnicon" id="exportBtn" title="내보내기">⤴</button>
    <button class="gnicon" id="menuBtn" title="더보기">⋯</button>
  </div>

  <!-- 보조 바: 실행취소 + 도구 옵션 + 줌 -->
  <div class="gnsub">
    <span class="undopill"><button id="undoBtn" title="실행 취소">↺</button><button id="redoBtn" title="다시 실행">↻</button></span>
    <span class="gnsep2 tool-only"></span>
    <div class="colors" id="colors"></div>
    <span class="gnsep2 tool-only" id="sizeSep"></span>
    <div class="sizes" id="sizes"></div>
    <span class="gngrow"></span>
    <span class="gnz zlabel" style="pointer-events:none" id="pageInd">1 / 1</span>
    <span class="gnsep2"></span>
    <div class="zoomg2">
      <button class="gnz" id="zoomOut" title="축소">－</button>
      <button class="gnz zlabel" id="zoomLabel" title="화면 맞춤">100%</button>
      <button class="gnz" id="zoomIn" title="확대">＋</button>
    </div>
  </div>

  <div id="stage">
    <canvas id="board"></canvas>
  </div>

  <!-- 페이지 썸네일 패널 -->
  <div id="pages">
    <div class="ph"><span>페이지</span><button class="tbtn" id="pagesClose" style="width:32px;height:32px">×</button></div>
    <div class="plist" id="plist"></div>
    <button class="addp" id="addPageBtn">＋ 페이지 추가</button>
  </div>
</div>

<script>
"use strict";
/* =========================================================================
   쌤노트 — GoodNotes 스타일 손글씨 노트 (단일 파일, 오프라인 동작)
   저장: localStorage / 벡터 스트로크 기반 렌더링 / 포인터(펜·터치·마우스) 지원
   ========================================================================= */

const $  = s => document.querySelector(s);
const el = (t,c)=>{const e=document.createElement(t); if(c)e.className=c; return e;};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------- 페이지 규격(논리 좌표, A4 비율) ---------- */
const PAGE_W = 1240, PAGE_H = 1754;

/* ---------- 팔레트 / 규격 ---------- */
const COLORS = ['#1c2530','#5b6470','#ff3b30','#ff9500','#ffcc00','#34c759',
                '#0a84ff','#5e5ce6','#af52de','#ff2d95','#8b5a2b','#ffffff'];
const PEN_SIZES = [2.2,3.6,6,9];
const HL_SIZES  = [16,26,38];
const ER_SIZES  = [20,40,70];
const TEMPLATES = ['blank','lined','narrow','grid','dots','cornell','todo'];
const TEMPLATE_KO = {blank:'무지',lined:'줄노트',narrow:'좁은 줄',grid:'모눈',dots:'점',cornell:'코넬',todo:'체크리스트'};
const TEMPLATE_DESC = {blank:'자유롭게',lined:'필기 기본',narrow:'촘촘한 줄',grid:'그래프·표',dots:'도트 그리드',cornell:'코넬 노트',todo:'할 일 목록'};
const COVERS = ['#0a84ff','#5e5ce6','#34c759','#ff9500','#ff3b30','#ff2d95','#20262e','#8b5a2b'];

/* ============================ 저장소 ============================ */
const DB_KEY='ssamnote_db_v2';
let db = load();
function load(){
  try{ const d=JSON.parse(localStorage.getItem(DB_KEY)); if(d&&d.notebooks) return d; }catch(e){}
  return {notebooks:[], theme:null};
}
let saveTimer=null;
function save(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{
  try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
  catch(e){ toast('저장 공간이 부족합니다'); }
},400); }
function saveNow(){ clearTimeout(saveTimer); try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }catch(e){} }

let _id = Date.now();
const uid = ()=> (++_id).toString(36);

function newPage(template,paper){ return {id:uid(), template:template||'lined', paper:paper||'cream', strokes:[], texts:[]}; }
function newNotebook(opt){
  opt=opt||{};
  const tpl=opt.template||'lined', paper=opt.paper||'cream';
  const nb={id:uid(), title:opt.title||'새 노트', cover:opt.cover||COVERS[db.notebooks.length%COVERS.length],
            template:tpl, paper, created:Date.now(), updated:Date.now(), pages:[newPage(tpl,paper)]};
  db.notebooks.unshift(nb); saveNow(); return nb;
}
const PAPERS={white:'흰색', cream:'크림', gray:'연회색'};
function paperFill(pg){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const p=pg&&pg.paper;
  if(p==='cream') return dark?'#242017':'#f8f6e7';
  if(p==='gray')  return dark?'#1c2027':'#eef1f4';
  return cssVar('--paper');
}

/* ============================ 앱 상태 ============================ */
let nb=null, pi=0, page=null;           // 현재 노트/페이지 인덱스/페이지
let tool='pen', color=COLORS[0], penSize=PEN_SIZES[1], hlSize=HL_SIZES[1], erSize=ER_SIZES[1];
let shapeKind='line', shapeSize=PEN_SIZES[1];
let fingerDraw = db.fingerDraw!==false;   // 손가락으로 그리기 (기본 켜짐). 끄면 손가락은 이동/확대 전용
const SHAPE_KO={line:'직선',rect:'사각형',ellipse:'원',arrow:'화살표'};
const view={s:1, tx:0, ty:0};           // 화면 변환 (scale, translate)
let needsRender=true;

const board=$('#board');
const ctx=board.getContext('2d');
const stage=$('#stage');

/* ============================ 테마 ============================ */
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t==='dark'?'dark':'light'); db.theme=t; }
applyTheme(db.theme || (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));
$('#themeBtn').onclick=()=>{ applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); save(); scheduleRender(); };

/* ============================ 서재(라이브러리) ============================ */
function renderLibrary(){
  const wrap=$('#library'); wrap.innerHTML='';
  const head=el('div','shelf-head');
  head.innerHTML=`<div><h2>서재</h2><div class="sub">${db.notebooks.length}권의 노트 · 이 기기에 저장됩니다</div></div>`;
  wrap.appendChild(head);
  const grid=el('div','grid');

  const addCard=el('div','card');
  addCard.innerHTML=`<div class="cover new"><div class="plus">＋</div><div>새 노트</div></div><div class="cap">노트 만들기</div>`;
  addCard.onclick=openNewNote;
  grid.appendChild(addCard);

  for(const n of db.notebooks){
    const card=el('div','card');
    const d=new Date(n.updated);
    const dd=`${d.getMonth()+1}/${d.getDate()}`;
    card.innerHTML=`
      <div class="cover" style="background:linear-gradient(160deg,${shade(n.cover,18)},${n.cover})">
        <div class="spine"></div>
        <div class="ct"><div class="t">${esc(n.title)}</div><div class="m">${n.pages.length}쪽 · ${dd}</div></div>
      </div>
      <div class="cap">${esc(n.title)}<small>${n.pages.length}쪽</small></div>`;
    card.querySelector('.cover').onclick=()=>open(n);
    card.querySelector('.cap').onclick=()=>open(n);
    // 길게 눌러 삭제/이름변경
    let lt; const dn=()=>{lt=setTimeout(()=>bookMenu(n),550);}; const up=()=>clearTimeout(lt);
    card.addEventListener('pointerdown',dn); card.addEventListener('pointerup',up); card.addEventListener('pointerleave',up);
    grid.appendChild(card);
  }
  wrap.appendChild(grid);
}
function bookMenu(n){
  const what=prompt(`"${n.title}"\n\n1: 이름 변경\n2: 삭제\n\n번호 입력`,'1');
  if(what==='1'){ const t=prompt('노트 제목',n.title); if(t!=null){ n.title=t.trim()||'제목 없음'; n.updated=Date.now(); saveNow(); renderLibrary(); } }
  else if(what==='2'){ if(confirm(`"${n.title}"을(를) 삭제할까요? 되돌릴 수 없습니다.`)){ db.notebooks=db.notebooks.filter(x=>x.id!==n.id); saveNow(); renderLibrary(); } }
}

/* ---------- 새 노트 만들기: 노트 유형 + 표지 선택 ---------- */
function openNewNote(){
  let selTpl='lined', selCov=COVERS[db.notebooks.length%COVERS.length], selPaper='cream';
  const bd=el('div','backdrop'); bd.id='nnbd'; bd.style.zIndex=54; bd.onclick=close; document.body.appendChild(bd);
  const pop=el('div'); pop.id='newpop';
  pop.innerHTML=`
    <div class="nnh"><b>새 노트 만들기</b></div>
    <input id="nnTitle" class="nninput" value="새 노트" maxlength="40">
    <div class="nnsec">노트 유형 <span>${TEMPLATES.length}종</span></div>
    <div class="nngrid" id="nnTpls"></div>
    <div class="nnsec">종이 색</div>
    <div class="nnpaper" id="nnPaper"></div>
    <div class="nnsec">표지 색상</div>
    <div class="nncov" id="nnCov"></div>
    <div class="cvfoot"><button id="nnCancel">취소</button><button id="nnMake" class="prim">만들기</button></div>`;
  document.body.appendChild(pop);
  function close(){ pop.remove(); bd.remove(); }
  const tg=pop.querySelector('#nnTpls');
  const drawTiles=()=>{ tg.querySelectorAll('.nntile canvas').forEach((cv,i)=>tplThumb(TEMPLATES[i],cv,selPaper)); };
  TEMPLATES.forEach(t=>{
    const tile=el('button','nntile'+(t===selTpl?' on':'')); tile.dataset.t=t;
    const cv=el('canvas'); cv.width=112; cv.height=Math.round(112*PAGE_H/PAGE_W); tplThumb(t,cv,selPaper);
    tile.appendChild(cv);
    const lb=el('div','nnlb'); lb.innerHTML=`<b>${TEMPLATE_KO[t]}</b><span>${TEMPLATE_DESC[t]||''}</span>`; tile.appendChild(lb);
    tile.onclick=()=>{ selTpl=t; tg.querySelectorAll('.nntile').forEach(x=>x.classList.toggle('on',x===tile)); };
    tg.appendChild(tile);
  });
  // 종이 색
  const pg=pop.querySelector('#nnPaper');
  Object.keys(PAPERS).forEach(k=>{ const b=el('button','nnpchip'+(k===selPaper?' on':''));
    b.innerHTML=`<span class="sw" style="background:${k==='cream'?'#f8f6e7':k==='gray'?'#eef1f4':'#ffffff'}"></span>${PAPERS[k]}`;
    b.onclick=()=>{ selPaper=k; pg.querySelectorAll('.nnpchip').forEach(x=>x.classList.remove('on')); b.classList.add('on'); drawTiles(); };
    pg.appendChild(b); });
  // 표지 색
  const cg=pop.querySelector('#nnCov');
  COVERS.forEach(cv=>{ const s=el('div','nncdot'+(cv===selCov?' on':'')); s.style.background=cv;
    s.onclick=()=>{ selCov=cv; cg.querySelectorAll('.nncdot').forEach(x=>x.classList.toggle('on',x===s)); };
    cg.appendChild(s); });
  pop.querySelector('#nnCancel').onclick=close;
  pop.querySelector('#nnMake').onclick=()=>{
    const title=(pop.querySelector('#nnTitle').value||'').trim()||'새 노트';
    const n=newNotebook({title, template:selTpl, cover:selCov, paper:selPaper}); close(); open(n);
  };
}
function tplThumb(tpl, cv, paper){
  const c=cv.getContext('2d'), sc=cv.width/PAGE_W;
  c.fillStyle=paperFill({paper}); c.fillRect(0,0,cv.width,cv.height);
  c.save(); c.scale(sc,sc); drawTemplate(c,tpl,paper); c.restore();
}

/* ============================ 노트 열기/닫기 + 문서 탭 ============================ */
let openTabs = Array.isArray(db.openTabs)? db.openTabs.slice() : [];
function open(n){
  commitText();
  nb=n; pi=0; page=nb.pages[0];
  if(!openTabs.includes(n.id)) openTabs.push(n.id);
  db.openTabs=openTabs; save();
  $('#library').classList.add('hidden'); $('#libbar').classList.add('hidden');
  $('#editor').classList.remove('hidden');
  clearSelection(); clearTextSel();
  buildColorBar(); buildSizeBar(); setTool(tool);
  renderTabs(); fitPage(); refreshPageUI();
  scheduleRender();
}
function closeEditor(){
  saveNow();
  commitText();
  $('#editor').classList.add('hidden');
  $('#library').classList.remove('hidden'); $('#libbar').classList.remove('hidden');
  clearSelection(); $('#pages').classList.remove('open');
  renderLibrary();
}
function renderTabs(){
  const strip=$('#tabstrip'); strip.innerHTML='';
  openTabs=openTabs.filter(id=>db.notebooks.some(x=>x.id===id));   // 삭제된 노트 정리
  openTabs.forEach(id=>{
    const note=db.notebooks.find(x=>x.id===id); if(!note)return;
    const tab=el('div','gtab'+(nb&&id===nb.id?' on':''));
    tab.innerHTML=`<span class="tx">${esc(note.title)}</span><span class="cl" title="닫기">×</span>`;
    tab.querySelector('.tx').onclick=()=>{ if(id!==nb.id){ const t=db.notebooks.find(x=>x.id===id); if(t)open(t); }
      else { const nt=prompt('노트 제목',nb.title); if(nt!=null){nb.title=nt.trim()||'제목 없음'; markDirty(); renderTabs();} } };
    tab.querySelector('.cl').onclick=e=>{ e.stopPropagation(); closeTab(id); };
    strip.appendChild(tab);
  });
}
function closeTab(id){
  openTabs=openTabs.filter(x=>x!==id); db.openTabs=openTabs; save();
  if(nb && id===nb.id){
    if(openTabs.length){ const t=db.notebooks.find(x=>x.id===openTabs[openTabs.length-1]); if(t){open(t);return;} }
    closeEditor(); return;
  }
  renderTabs();
}
$('#backBtn').onclick=closeEditor;
$('#newTabBtn').onclick=openNewNote;

/* ============================ 도구 UI ============================ */
const COLOR_TOOLS=['pen','highlighter','shape'];
const SIZE_TOOLS=['pen','highlighter','eraser','shape'];
function curSize(){ return tool==='highlighter'?hlSize : tool==='eraser'?erSize : tool==='shape'?shapeSize : penSize; }
function setCurSize(v){ if(tool==='highlighter')hlSize=v; else if(tool==='eraser')erSize=v; else if(tool==='shape')shapeSize=v; else penSize=v; }
function sizeRange(){ return tool==='highlighter'?[8,48] : tool==='eraser'?[8,100] : [1,20]; }

function setTool(t){
  tool=t;
  document.querySelectorAll('#toolset .rtool').forEach(b=>b.classList.toggle('on',b.dataset.tool===t));
  const showColor=COLOR_TOOLS.includes(t), showSize=SIZE_TOOLS.includes(t);
  $('#colors').style.display=showColor?'':'none';
  document.querySelectorAll('.tool-only').forEach(s=>s.style.display=(showColor||showSize)?'':'none');
  $('#sizeSep').style.display=(showColor&&showSize)?'':'none';
  $('#sizes').style.display=showSize?'':'none';
  // 선택된 도구 하단 표시색
  const active=document.querySelector(`#toolset .rtool[data-tool="${t}"]`);
  if(active) active.style.setProperty('--tool-color', showColor?color:'var(--accent)');
  if(t!=='lasso') clearSelection();
  if(t!=='lasso'&&t!=='text') clearTextSel();
  if(t!=='text') commitText();
  closeToolPop();
  buildColorBar(); buildSizeBar();
}
document.querySelectorAll('#toolset .rtool').forEach(b=>b.onclick=()=>{
  if(b.dataset.tool===tool){ toggleToolPop(b); }   // 이미 선택된 도구 재탭 → 옵션
  else setTool(b.dataset.tool);
});

function buildColorBar(){
  const c=$('#colors'); c.innerHTML='';
  COLORS.slice(0,7).forEach(col=>{
    const s=el('div','swatch'+(col==='#ffffff'?' white':'')); s.style.background=col;
    if(col===color) s.classList.add('on');
    s.onclick=()=>{ color=col; refreshToolColor(); buildColorBar(); };
    c.appendChild(s);
  });
}
function buildSizeBar(){
  const box=$('#sizes'); box.innerHTML='';
  const set = tool==='highlighter'?HL_SIZES : tool==='eraser'?ER_SIZES : PEN_SIZES;
  const cur = curSize();
  set.forEach(sz=>{
    const b=el('button','sizedot'+(Math.abs(sz-cur)<0.01?' on':''));
    const dot=el('i'); const d=Math.max(4,Math.min(22, tool==='eraser'?sz/3.2:sz*1.7));
    dot.style.width=d+'px'; dot.style.height=d+'px';
    b.appendChild(dot);
    b.onclick=()=>{ setCurSize(sz); buildSizeBar(); };
    box.appendChild(b);
  });
}
function refreshToolColor(){ const a=document.querySelector(`#toolset .rtool.on`); if(a&&COLOR_TOOLS.includes(tool)) a.style.setProperty('--tool-color',color); }

/* ---------- 도구 옵션 팝오버 (색상 전체 + 굵기 슬라이더 + 도형 종류) ---------- */
function closeToolPop(){ $('#toolpop')?.remove(); $('#tpbd')?.remove(); }
function toggleToolPop(btn){ if($('#toolpop')){ closeToolPop(); return; } openToolPop(btn); }
function openToolPop(btn){
  closeToolPop();
  const bd=el('div','backdrop'); bd.id='tpbd'; bd.style.zIndex=43; bd.onclick=closeToolPop; document.body.appendChild(bd);
  const p=el('div','toolpop'); p.id='toolpop';
  // 도형 종류
  if(tool==='shape'){
    p.insertAdjacentHTML('beforeend',`<h4>도형</h4>`);
    const row=el('div','kinds');
    [['line','／'],['rect','▭'],['ellipse','◯'],['arrow','↗']].forEach(([k,ic])=>{
      const b=el('button','kind'+(k===shapeKind?' on':'')); b.textContent=ic; b.title=SHAPE_KO[k];
      b.onclick=()=>{ shapeKind=k; row.querySelectorAll('.kind').forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
      row.appendChild(b);
    });
    p.appendChild(row);
  }
  // 색상
  if(COLOR_TOOLS.includes(tool)){
    p.insertAdjacentHTML('beforeend',`<h4>색상</h4>`);
    const grid=el('div','palette');
    COLORS.forEach(col=>{ const s=el('div','swatch'+(col==='#ffffff'?' white':'')+(col===color?' on':'')); s.style.background=col;
      s.onclick=()=>{ color=col; refreshToolColor(); buildColorBar();
        grid.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on')); s.classList.add('on'); };
      grid.appendChild(s); });
    p.appendChild(grid);

/* 스트로크 외곽선(좌/우 오프셋 + 둥근 끝)을 만들어 채우면 매끄러운 가변폭 획이 됨 */
function buildInkPath(pts, size){

function drawShape(c,st){

    case 'erase':    if(undo) page.strokes.push(...op.strokes); else page.strokes=page.strokes.filter(s=>!op.strokes.includes(s)); break;

let penSeen=false, penDown=false, _penUpT=0;
function penActiveRecently(){ return (typeof performance!=='undefined') && (performance.now()-_penUpT < 500); } // 펜 뗀 직후 잔여 손터치 차단
/* 필압: 스타일러스는 실제 압력, 손가락/마우스는 '속도'로 굵기 흉내(느릴수록 굵게) */
let _pLastT=0,_pLastPt=null,_pEma=0;
function pressure(e,pt,start){
  if(e.pointerType==='pen' && e.pressure>0) return clamp(e.pressure,0.06,1);
  const now=(typeof performance!=='undefined'?performance.now():0);
  if(start||!_pLastPt){ _pLastT=now; _pLastPt=pt; _pEma=0; return 0.72; }
  const dt=Math.max(1, now-_pLastT), d=Math.hypot(pt.x-_pLastPt.x, pt.y-_pLastPt.y);
  _pEma=_pEma*0.7 + (d/dt)*0.3; _pLastT=now; _pLastPt=pt;
  return clamp(1 - _pEma/2.3, 0.34, 1);
}

function onMove(e){
  if(!pointers.has(e.pointerId) && !active && !panning && !lasso && !selDrag && !textDrag && !textWResize && !textDragSel) return;
  const l=localXY(e);
  if(pointers.has(e.pointerId)) pointers.set(e.pointerId,l);

  if(pinch){ doPinch(); return; }
  if(textWResize){ doWidthResize(l); return; }
  if(textDragSel){ const dx=(l.x-textDragSel.lx)/view.s, dy=(l.y-textDragSel.ly)/view.s;
    textSel.forEach(t=>{t.x+=dx;t.y+=dy;}); textDragSel.lx=l.x; textDragSel.ly=l.y; textDragSel.moved=true; scheduleRender(); return; }
  if(panning){ view.tx+=l.x-panning.x; view.ty+=l.y-panning.y; panning={x:l.x,y:l.y}; clampView(); scheduleRender(); return; }

  const p=toPage(l.x,l.y);
  if(active){
    if(active.tool==='shape'){
      let bx=p.x,by=p.y;
      if(e.shiftKey && (active.kind==='rect'||active.kind==='ellipse')){ // 정사각/정원
        const a=active.points[0], s=Math.max(Math.abs(p.x-a.x),Math.abs(p.y-a.y));
        bx=a.x+Math.sign(p.x-a.x||1)*s; by=a.y+Math.sign(p.y-a.y||1)*s;
      }
      active.points[1]={x:bx,y:by}; scheduleRender(); return;
    }
    const last=active.points[active.points.length-1];
    if(Math.hypot(p.x-last.x,p.y-last.y) > (active.tool==='highlighter'?1.2:0.5)){
      // 입력 스무딩: 원점 방향으로 살짝 당겨 지터 감소(펜은 약하게, 손가락은 강하게)
      const k=(e.pointerType==='pen')?0.78:0.6;

    textDrag.t.x+=dx; textDrag.t.y+=dy; textDrag.lx=l.x; textDrag.ly=l.y; textDrag.moved=true; scheduleRender(); return; }

}

function onUp(e){
  if(e.pointerType==='pen'){ penDown=false; _penUpT=(typeof performance!=='undefined'?performance.now():0); }

  if(pointers.size>=1 && (active||panning)){ /* 남은 손가락은 무시(들어야 재시작) */ }

  if(active){
    if(active.tool==='shape'){
      const A=active.points[0], B=active.points[1];
      if(Math.hypot(B.x-A.x,B.y-A.y) > 6){ page.strokes.push(active); pushUndo({t:'add',stroke:active}); }
    } else if(active.points.length){ page.strokes.push(active); pushUndo({t:'add',stroke:active}); }
    active=null; scheduleRender(); return;
  }
  if(eraseBatch){ if(eraseBatch.length) pushUndo({t:'erase',strokes:eraseBatch}); eraseBatch=null; return; }
  if(panning){ panning=null; return; }
  if(selDrag){ if(selection.dx||selection.dy) pushUndo({t:'move',strokes:selection.strokes.slice(),dx:selection.dx,dy:selection.dy}); selection.dx=selection.dy=0; selDrag=null; return; }

    if(t.w!==textWResize.beforeW || t.x!==textWResize.beforeX)

    textWResize=null; scheduleRender(); return; }
  if(textDragSel){ if(textDragSel.moved){ const t0=textSel[0]; pushUndo({t:'textmovemulti',texts:textSel.slice(),dx:t0.x-textDragSel.ox[0],dy:t0.y-textDragSel.oy[0]}); }
    textDragSel=null; return; }
  if(textDrag){ const t=textDrag.t;
    if(textDrag.moved){ pushUndo({t:'textmove',text:t,dx:t.x-textDrag.ox,dy:t.y-textDrag.oy}); }
    else { openTextEditor(t.x,t.y,t); }
    textDrag=null; return; }
  if(lasso){ finishLasso(); return; }
}

function cancelActive(){
  if(active){ active=null; }
  if(eraseBatch){ eraseBatch=null; }
  if(lasso){ lasso=null; }
  if(panning){ panning=null; }
  if(selDrag){ selDrag=null; }
  if(textDrag){ textDrag=null; }
  if(textWResize){ textWResize=null; }
  if(textDragSel){ textDragSel=null; }
  scheduleRender();
}

/* ---------- 지우개 ---------- */
function eraseAt(p){
  const r=erSize/2; const removed=[];
  page.strokes=page.strokes.filter(st=>{
    const hit=pointsOf(st).some(pt=>Math.hypot(pt.x-p.x,pt.y-p.y) < r + st.size/2);
    if(hit){ removed.push(st); return false; } return true;
  });
  if(removed.length){ eraseBatch.push(...removed); scheduleRender(); }
}

/* ---------- 핀치 확대/축소 ---------- */
function startPinch(){
  cancelActive();

  pinch={d:dist(a,b), cx:(a.x+b.x)/2, cy:(a.y+b.y)/2, s0:view.s, tx0:view.tx, ty0:view.ty};
}
function doPinch(){
  const v=[...pointers.values()]; if(v.length<2)return;
  const [a,b]=v; const d=dist(a,b), cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
  let s=clamp(pinch.s0 * d/pinch.d, 0.15, 8);
  // 초점 유지 + 두 손가락 이동에 따른 패닝
  const wx=(pinch.cx-pinch.tx0)/pinch.s0, wy=(pinch.cy-pinch.ty0)/pinch.s0;
  view.s=s; view.tx=cx-wx*s; view.ty=cy-wy*s; clampView(); updateZoom(); scheduleRender();
}
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

/* 데스크톱: 휠 확대/축소 + 트랙패드 패닝 */
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey || e.metaKey){
    const l=localXY(e); const w=toPage(l.x,l.y);
    view.s=clamp(view.s*(1-e.deltaY*0.0016),0.15,8);
    view.tx=l.x-w.x*view.s; view.ty=l.y-w.y*view.s; clampView(); updateZoom(); scheduleRender();
  }else{ view.tx-=e.deltaX; view.ty-=e.deltaY; clampView(); scheduleRender(); }
},{passive:false});

/* ============================ 올가미 선택 ============================ */
function drawLassoPath(){
  if(!lasso||lasso.pts.length<2)return;
  ctx.save(); ctx.setTransform(window.devicePixelRatio||1,0,0,window.devicePixelRatio||1,0,0);
  ctx.beginPath(); ctx.moveTo(lasso.pts[0].x,lasso.pts[0].y);
  lasso.pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.setLineDash([6,5]); ctx.strokeStyle=cssVar('--accent'); ctx.lineWidth=1.5; ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}
function finishLasso(){
  const poly=lasso.page; const picked=[]; const pickedText=[];
  if(poly.length>=3){
    for(const st of page.strokes){
      const pts=pointsOf(st); const inside=pts.reduce((n,pt)=>n+(pointInPoly(pt,poly)?1:0),0);
      if(inside>=Math.max(1,Math.ceil(pts.length*0.55))) picked.push(st);   // 과반 포함이면 선택(촘촘한 올가미도 획을 놓치지 않음)
    }
    for(const t of page.texts){ const bb=textBBox(t);
      const c={x:(bb.x+bb.x2)/2,y:(bb.y+bb.y2)/2};
      if(pointInPoly(c,poly)) pickedText.push(t);   // 텍스트는 중심이 올가미 안이면 선택
    }
  }
  lasso=null; clearSelection(); clearTextSel();
  if(pickedText.length){ selectTexts(pickedText); }   // 텍스트를 묶으면 텍스트 위에 메뉴 표시
  else if(picked.length){ selection={strokes:picked,dx:0,dy:0}; }
  scheduleRender();
}
function pointInPoly(p,poly){
  let c=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const a=poly[i],b=poly[j];
    if(((a.y>p.y)!==(b.y>p.y)) && (p.x < (b.x-a.x)*(p.y-a.y)/(b.y-a.y)+a.x)) c=!c;
  }

}
function pointInSel(p){ if(!selection)return false; const bb=selBBox(); return p.x>=bb.x-10&&p.x<=bb.x2+10&&p.y>=bb.y-10&&p.y<=bb.y2+10; }
function selBBox(){
  let a=1e9,b=1e9,cX=-1e9,dY=-1e9;
  selection.strokes.forEach(st=>{const bb=strokeBBox(st);a=Math.min(a,bb.x);b=Math.min(b,bb.y);cX=Math.max(cX,bb.x2);dY=Math.max(dY,bb.y2);});

}
function drawSelectionOutline(c){

}

/* ============================ 손글씨 → 텍스트 인식 ============================ */
// Google Input Tools 필기 인식(무료·키 불필요, 인식 시 인터넷 필요). 한국어/영어 지원.
// 선택 영역을 '줄'로 분리해 각 줄을 인식 → 여러 줄 텍스트로 합침.
function segmentLines(strokes){
  // idx = 원래(=쓴) 순서. 인식은 쓴 순서를 유지할수록 정확도가 높다.
  const items=strokes.map((s,idx)=>{const bb=strokeBBox(s);return{s,idx,cy:(bb.y+bb.y2)/2,h:bb.y2-bb.y};});
  if(!items.length) return [];
  const avgH=items.reduce((a,b)=>a+b.h,0)/items.length;
  const thr=Math.max(24, avgH*0.7);
  const byY=[...items].sort((a,b)=>a.cy-b.cy);
  const lines=[]; let cur=[], lineMax=-1e9;
  for(const it of byY){
    if(cur.length && it.cy-lineMax>thr){ lines.push(cur); cur=[]; }
    cur.push(it); lineMax=Math.max(lineMax, it.cy);
  }
  if(cur.length) lines.push(cur);
  // 줄들은 위→아래, 각 줄 내부는 쓴 순서(idx)대로
  lines.sort((a,b)=>Math.min(...a.map(o=>o.cy))-Math.min(...b.map(o=>o.cy)));
  return lines.map(ln=>ln.sort((a,b)=>a.idx-b.idx).map(o=>o.s));
}
async function recognizeGroup(strokes, lang){
  if(window.__mockRecognize) return await window.__mockRecognize(strokes,lang);
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  strokes.forEach(st=>pointsOf(st).forEach(p=>{minx=Math.min(minx,p.x);miny=Math.min(miny,p.y);maxx=Math.max(maxx,p.x);maxy=Math.max(maxy,p.y);}));
  const w=Math.max(1,maxx-minx), h=Math.max(1,maxy-miny);
  // 타임스탬프를 스트로크를 넘어 연속(monotonic)으로 → 연속 필기 인식 정확도↑
  let clock=0;
  const ink=strokes.map(st=>{const pts=pointsOf(st);const xs=[],ys=[],ts=[];
    pts.forEach(p=>{xs.push(Math.round(p.x-minx));ys.push(Math.round(p.y-miny));ts.push(clock);clock+=10;}); clock+=60; return [xs,ys,ts];});
  const body={options:"enable_pre_space",requests:[{writing_guide:{writing_area_width:Math.round(w),writing_area_height:Math.round(h),writing_area_top:0,writing_area_left:0},ink,language:lang,max_num_results:10}]};
  const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(),9000);
  try{
    const res=await fetch(`https://inputtools.google.com/request?itc=${lang}-t-i0-handwrit&app=ssamnote`,
      {method:'POST',body:JSON.stringify(body),signal:ctrl.signal});
    const data=await res.json();
    if(data[0]==='SUCCESS' && data[1] && data[1][0]) return data[1][0][1]||[];
    return [];
  } finally { clearTimeout(timer); }
}
// 반환: {text:'여러 줄', cands:[첫 줄 후보들], lines:n}
async function recognizeInk(strokes, lang){
  const lines=segmentLines(strokes);
  if(lines.length<=1){ const c=await recognizeGroup(strokes,lang); return {text:(c[0]||''), cands:c, lines:1}; }
  const outs=[]; let first=[];
  for(const ln of lines){ const c=await recognizeGroup(ln,lang); outs.push(c[0]||''); if(!first.length)first=c; }
  return {text:outs.join('\n'), cands:first, lines:lines.length};
}
let convLang='ko';

function insertText(str, strokes, bb){
  const col=commonColor(strokes);
  const nlines=str.split('\n').length;
  const size=clamp((bb.y2-bb.y)/nlines*0.78, 18, 90);   // 여러 줄이면 줄 높이에 맞춰 글자 크기 계산
  const t={id:uid(), x:bb.x, y:bb.y, text:str, color:col, size:Math.round(size)};
  page.strokes=page.strokes.filter(s=>!strokes.includes(s));
  page.texts.push(t);
  pushUndo({t:'convert',strokes:strokes.slice(),text:t});
  clearSelection(); selectTexts([t]); scheduleRender();   // 변환 직후 바로 크기 조정/메뉴 가능
}
function commonColor(strokes){ const m={}; strokes.forEach(s=>{m[s.color]=(m[s.color]||0)+1;});
  return Object.keys(m).sort((a,b)=>m[b]-m[a])[0]||COLORS[0]; }

/* ============================ 텍스트 선택 · 크기 조정 · 메뉴 ============================ */
function textBBox(t){

}
function textUnionBBox(){ let a=1e9,b=1e9,cX=-1e9,dY=-1e9;
  textSel.forEach(t=>{const bb=textBBox(t);a=Math.min(a,bb.x);b=Math.min(b,bb.y);cX=Math.max(cX,bb.x2);dY=Math.max(dY,bb.y2);});
  return {x:a,y:b,x2:cX,y2:dY}; }
function pointInTextUnion(p){ if(!textSel.length)return false; const bb=textUnionBBox();
  return p.x>=bb.x-8&&p.x<=bb.x2+8&&p.y>=bb.y-8&&p.y<=bb.y2+8; }
// 단일 텍스트 선택 시 좌/우 너비 조절 핸들(스크린 좌표)
function textSideHandles(){ if(textSel.length!==1)return null; const bb=textBBox(textSel[0]); const my=(bb.y+bb.y2)/2;
  return {l:toScreen(bb.x-10,my), r:toScreen(bb.x2+10,my)}; }
function selectTexts(arr){ clearSelection(); textSel=arr.slice(); scheduleRender(); }
function clearTextSel(){ if(textSel.length){ textSel=[]; $('#txtbar')?.remove(); $('#txtcolpop')?.remove(); scheduleRender(); } }
function drawTextSelection(c){
  if(!textSel.length)return; const bb=textUnionBBox();
  c.save(); c.strokeStyle=cssVar('--accent'); c.lineWidth=1.5/view.s;
  c.strokeRect(bb.x-8,bb.y-6,(bb.x2-bb.x)+16,(bb.y2-bb.y)+12);
  if(textSel.length===1){   // 좌/우 너비 핸들(글상자)
    const my=(bb.y+bb.y2)/2, r=7/view.s;
    [[bb.x-8,my],[bb.x2+8,my]].forEach(([hx,hy])=>{
      c.fillStyle='#fff'; c.beginPath(); c.arc(hx,hy,r,0,7); c.fill();
      c.lineWidth=2/view.s; c.stroke(); });
  }
  c.restore();
}
function beginWidthResize(side){ const t=textSel[0]; const bb=textBBox(t);
  if(t.w==null) t.w=Math.round(bb.x2-bb.x);
  textWResize={side, t, beforeW:t.w, beforeX:t.x, rightEdge:t.x+t.w}; }
function doWidthResize(l){
  const t=textWResize.t, p=toPage(l.x,l.y), minW=Math.max(40,t.size*1.2);
  if(textWResize.side==='r'){ t.w=clamp(Math.round(p.x-t.x),minW,5000); }
  else { const nx=Math.min(p.x, textWResize.rightEdge-minW); t.x=Math.round(nx); t.w=Math.round(textWResize.rightEdge-nx); }
  scheduleRender();
}
function positionTxtbar(){
  let bar=$('#txtbar');
  if(!textSel.length){ bar?.remove(); return; }
  if(!bar){ bar=el('div'); bar.id='txtbar';
    bar.innerHTML=
      `<button data-a="color" title="색상"><span class="cdot" id="tbcolor"></span></button>`+
      `<button data-a="dec" title="작게">A−</button><span class="tbsize" id="tbsize">24</span><button data-a="inc" title="크게">A＋</button>`+
      `<button data-a="font" title="글꼴"><span style="font-weight:700">A</span><span style="font-size:11px">a</span></button>`+
      `<span class="tbsep"></span>`+
      `<button data-a="bold" title="굵게" style="font-weight:800">B</button><button data-a="italic" title="기울임" style="font-style:italic">I</button>`+
      `<button data-a="align" title="정렬">≣</button>`+
      `<span class="tbsep"></span>`+
      `<button data-a="edit" title="편집">✏️</button><button data-a="dup" title="복제">⧉</button><button data-a="del" class="danger" title="삭제">🗑</button>`;
    stage.appendChild(bar);
    // 편집(커서) 중에는 버튼을 눌러도 텍스트박스 포커스를 잃지 않도록
    bar.addEventListener('mousedown', e=>{ if(tedit) e.preventDefault(); });
    bar.onclick=e=>{ const btn=e.target.closest('button'); const a=btn?.dataset.a; if(!a)return;
      if(a==='edit'){ if(tedit)return; const t=textSel[0]; if(t){ openTextEditor(t.x,t.y,t); } }
      else if(a==='dec'||a==='inc'){ const f=a==='inc'?1.15:0.87; const before=textSel.map(t=>t.size);
        textSel.forEach(t=>t.size=clamp(Math.round(t.size*f),8,300)); pushUndo({t:'textsize',texts:textSel.slice(),before,after:textSel.map(t=>t.size)}); syncTxtbar(); syncEditorFromToolbar(); scheduleRender(); }
      else if(a==='color'){ openTextColorPop(bar); }
      else if(a==='font'){ cycleFont(); }
      else if(a==='bold'){ toggleTextProp('bold'); syncEditorFromToolbar(); }
      else if(a==='italic'){ toggleTextProp('italic'); syncEditorFromToolbar(); }
      else if(a==='align'){ cycleAlign(); syncEditorFromToolbar(); }
      else if(a==='dup'){ if(tedit)commitText(); const src=textSel.slice(); const copies=src.map(t=>({...t,id:uid(),x:t.x+24,y:t.y+24}));
        page.texts.push(...copies); pushUndo({t:'textaddmulti',texts:copies}); selectTexts(copies); }
      else if(a==='del'){ const arr=textSel.slice(); if(tedit){ teditNew=false; closeTextEditor(); } page.texts=page.texts.filter(x=>!arr.includes(x)); pushUndo({t:'textdelmulti',texts:arr}); clearTextSel(); }
    };
  }
  syncTxtbar();
  const bb=textUnionBBox(); const s=toScreen(bb.x-8,bb.y2+6);
  const bw=bar.offsetWidth||360;
  bar.style.left=clamp(s.x,8,stage.clientWidth-bw-8)+'px';
  bar.style.top=Math.min(stage.clientHeight-54, Math.max(8, s.y+12))+'px';
}
function cycleFont(){ const before=textSel.map(t=>t.font||'sans');
  const nv=FONT_ORDER[(FONT_ORDER.indexOf(textSel[0].font||'sans')+1)%FONT_ORDER.length];
  textSel.forEach(t=>t.font=nv); pushUndo({t:'textprop',prop:'font',texts:textSel.slice(),before,after:textSel.map(t=>t.font)});
  syncEditorFromToolbar(); toast('글꼴: '+FONT_KO[nv]); scheduleRender(); }
function syncTxtbar(){ const t=textSel[0]; if(!t)return;
  const sz=$('#tbsize'); if(sz) sz.textContent=Math.round(t.size);
  const cd=$('#tbcolor'); if(cd) cd.style.background=t.color;
  const bb=$('#txtbar [data-a="bold"]'), it=$('#txtbar [data-a="italic"]');
  if(bb) bb.classList.toggle('act', !!t.bold); if(it) it.classList.toggle('act', !!t.italic);
}
function toggleTextProp(prop){ const before=textSel.map(t=>!!t[prop]); const nv=!textSel[0][prop];
  textSel.forEach(t=>t[prop]=nv); pushUndo({t:'textprop',prop,texts:textSel.slice(),before,after:textSel.map(t=>!!t[prop])}); syncTxtbar(); scheduleRender(); }
function cycleAlign(){ const order=['left','center','right']; const before=textSel.map(t=>t.align||'left');
  const nv=order[(order.indexOf(textSel[0].align||'left')+1)%3];
  textSel.forEach(t=>t.align=nv); pushUndo({t:'textprop',prop:'align',texts:textSel.slice(),before,after:textSel.map(t=>t.align)}); toast('정렬: '+({left:'왼쪽',center:'가운데',right:'오른쪽'}[nv])); scheduleRender(); }
function openTextColorPop(bar){
  $('#txtcolpop')?.remove();
  const pop=el('div'); pop.id='txtcolpop';
  pop.addEventListener('mousedown', e=>{ if(tedit) e.preventDefault(); });   // 편집 중 포커스 유지
  COLORS.forEach(col=>{ const s=el('div','swatch'+(col==='#ffffff'?' white':'')); s.style.background=col;
    s.onclick=()=>{ const before=textSel.map(t=>t.color); textSel.forEach(t=>t.color=col);
      pushUndo({t:'textcolor',texts:textSel.slice(),before,after:textSel.map(t=>t.color)}); pop.remove(); syncTxtbar(); syncEditorFromToolbar(); scheduleRender(); };
    pop.appendChild(s); });
  stage.appendChild(pop);
  const r=bar.getBoundingClientRect(), sr=stage.getBoundingClientRect();
  pop.style.left=clamp(r.left-sr.left,8,stage.clientWidth-pop.offsetWidth-8)+'px';
  pop.style.top=(r.bottom-sr.top+6)+'px';
  setTimeout(()=>{ const off=e=>{ if(!pop.contains(e.target)){ pop.remove(); document.removeEventListener('pointerdown',off,true);} };
    document.addEventListener('pointerdown',off,true); },0);
}

/* ============================ 텍스트 ============================ */
let tedit=null, teditText=null, teditNew=false, teditBefore=null;
function hitText(p){
  for(let i=page.texts.length-1;i>=0;i--){ const t=page.texts[i];
    const lines=t.text.split('\n'); const lh=t.size*1.3;
    ctx.font=`${t.size}px sans-serif`;
    let w=0; lines.forEach(ln=>{w=Math.max(w,ctx.measureText(ln).width);});
    const h=lines.length*lh;
    if(p.x>=t.x-4&&p.x<=t.x+w+8&&p.y>=t.y-4&&p.y<=t.y+h+4) return t;
  }
  return null;
}
function applyEditorStyle(ta,t){
  const fs=t.size*view.s, sc=toScreen(t.x,t.y);
  ta.style.left=sc.x+'px'; ta.style.top=sc.y+'px'; ta.style.color=t.color;
  ta.style.font=`${t.italic?'italic ':''}${t.bold?'700':'400'} ${fs}px ${FONTS[t.font]||FONTS.sans}`;
  ta.style.textAlign=t.align||'left';
  const fixedW = t.w ? t.w*view.s : null;
  if(fixedW){ ta.style.width=fixedW+'px'; ta.style.whiteSpace='pre-wrap'; }
  else { ta.style.whiteSpace='pre'; ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px';
    ta.style.width='auto'; ta.style.width=Math.min(ta.scrollWidth+8, PAGE_W*view.s)+'px'; }
  ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px';
}
function openTextEditor(px,py,existing){
  commitText();            // 편집 중이던 텍스트가 있으면 먼저 저장
  let t=existing;
  if(!t){ t={id:uid(), x:px, y:py, text:'', color, size:34, align:'left', font:'sans'}; page.texts.push(t); teditNew=true; }
  else teditNew=false;
  teditText=t; teditBefore = existing? existing.text : ''; textSel=[t];
  const ta=el('textarea'); ta.id='tedit';
  ta.value=t.text; ta.rows=1; ta.style.minWidth='40px';
  applyEditorStyle(ta,t);
  stage.appendChild(ta); tedit=ta;
  const onInput=()=>{ t.text=ta.value; applyEditorStyle(ta,t); scheduleRender(); };
  ta.addEventListener('input',onInput);
  ta.addEventListener('blur',commitText);
  ta.addEventListener('keydown',e=>{ if(e.key==='Escape'){e.preventDefault(); ta.value=teditBefore; t.text=teditBefore; ta.blur();} });
  setTimeout(()=>{ applyEditorStyle(ta,t); ta.focus();
    try{ ta.setSelectionRange(ta.value.length,ta.value.length); }catch(_){}
    scheduleRender(); },0);
}
function syncEditorFromToolbar(){ if(tedit&&teditText){ applyEditorStyle(tedit,teditText); tedit.focus(); } }
function commitText(){
  if(!tedit) return;
  const val=tedit.value, t=teditText, wasNew=teditNew, before=teditBefore;
  closeTextEditor();
  if(!t) return;
  t.text=val;
  if(val.trim()===''){
    page.texts=page.texts.filter(x=>x!==t);
    if(!wasNew) pushUndo({t:'textdel',text:t});
    clearTextSel();
  } else if(wasNew){
    pushUndo({t:'textadd',text:t});
  } else if(val!==before){
    pushUndo({t:'textedit',text:t,before,after:val});
  } else { markDirty(); }
  scheduleRender();
}
function closeTextEditor(){ if(tedit){ const ta=tedit; tedit=null; teditText=null; teditNew=false; ta.removeEventListener('blur',commitText); ta.remove(); } }

function refreshPageUI(){ $('#pageInd').textContent=`${pi+1} / ${nb.pages.length}`; updateUndoUI(); }
function gotoPage(i){
  commitText(); clearSelection(); clearTextSel();
  pi=clamp(i,0,nb.pages.length-1); page=nb.pages[pi];
  refreshPageUI(); fitPage(); scheduleRender();
  document.querySelectorAll('#plist .thumb').forEach((t,k)=>t.classList.toggle('on',k===pi));
}
function buildPageList(){
  const list=$('#plist'); list.innerHTML='';
  nb.pages.forEach((pg,k)=>{
    const box=el('div','thumb'+(k===pi?' on':''));
    const cv=el('canvas'); cv.width=140; cv.height=Math.round(140*PAGE_H/PAGE_W);
    renderThumb(pg, cv);
    box.appendChild(cv);
    const n=el('div','n'); n.textContent=k+1; box.appendChild(n);
    const del=el('div','del'); del.textContent='×'; box.appendChild(del);
    box.onclick=e=>{ if(e.target===del){ delPage(k); } else gotoPage(k); };
    box.dataset.k=k;
    list.appendChild(box);
  });
}
function refreshThumb(k){
  const box=document.querySelector(`#plist .thumb[data-k="${k}"]`);
  if(box){ renderThumb(nb.pages[k], box.querySelector('canvas')); }
}
function delPage(k){
  if(nb.pages.length<=1){ toast('마지막 페이지는 삭제할 수 없어요'); return; }
  if(!confirm(`${k+1}쪽을 삭제할까요?`)) return;
  nb.pages.splice(k,1); if(pi>=nb.pages.length)pi=nb.pages.length-1;
  page=nb.pages[pi]; buildPageList(); refreshPageUI(); scheduleRender(); markDirty();
}
function renderThumb(pg, cv){
  const c=cv.getContext('2d'); const sc=cv.width/PAGE_W;
  c.setTransform(1,0,0,1,0,0); c.clearRect(0,0,cv.width,cv.height);
  c.fillStyle=paperFill(pg); c.fillRect(0,0,cv.width,cv.height);
  c.save(); c.scale(sc,sc);
  drawTemplate(c,pg.template,pg.paper);
  pg.strokes.forEach(s=>drawStroke(c,s));
  pg.texts.forEach(t=>drawTextObj(c,t));
  c.restore();
}

    pop.appendChild(all);

function miniTpl(box,t){
  const c=el('canvas'); c.width=34;c.height=24; const g=c.getContext('2d');
  g.fillStyle='#fff'; g.fillRect(0,0,34,24); g.strokeStyle='#9db'; g.strokeStyle='rgba(60,80,120,.4)'; g.lineWidth=.6;
  if(t==='lined'){for(let y=6;y<24;y+=6){g.beginPath();g.moveTo(3,y);g.lineTo(31,y);g.stroke();}}
  else if(t==='narrow'){for(let y=4;y<24;y+=4){g.beginPath();g.moveTo(3,y);g.lineTo(31,y);g.stroke();}}
  else if(t==='todo'){for(let y=6;y<24;y+=7){g.strokeRect(4,y-3,4,4);g.beginPath();g.moveTo(11,y-1);g.lineTo(31,y-1);g.stroke();}}
  else if(t==='grid'){for(let x=4;x<34;x+=6){g.beginPath();g.moveTo(x,0);g.lineTo(x,24);g.stroke();}for(let y=4;y<24;y+=6){g.beginPath();g.moveTo(0,y);g.lineTo(34,y);g.stroke();}}
  else if(t==='dots'){g.fillStyle='rgba(60,80,120,.5)';for(let x=5;x<34;x+=6)for(let y=5;y<24;y+=6){g.beginPath();g.arc(x,y,.9,0,7);g.fill();}}
  else if(t==='cornell'){g.beginPath();g.moveTo(11,2);g.lineTo(11,19);g.stroke();g.beginPath();g.moveTo(3,19);g.lineTo(31,19);g.stroke();}
  box.appendChild(c);
}

/* ============================ 내보내기 ============================ */
function pageToCanvas(pg, scale){
  scale=scale||2;
  const cv=el('canvas'); cv.width=PAGE_W*scale; cv.height=PAGE_H*scale;
  const c=cv.getContext('2d'); c.scale(scale,scale);
  c.fillStyle=paperFill(pg); c.fillRect(0,0,PAGE_W,PAGE_H);
  drawTemplate(c,pg.template,pg.paper); pg.strokes.forEach(s=>drawStroke(c,s)); pg.texts.forEach(t=>drawTextObj(c,t));
  return cv;
}
function exportPNG(){
  const url=pageToCanvas(page,2).toDataURL('image/png');
  const a=el('a'); a.href=url; a.download=`${nb.title}_${pi+1}.png`; a.click(); toast('PNG 저장됨');
}
function exportPDF(){
  const imgs=nb.pages.map(pg=>pageToCanvas(pg,2).toDataURL('image/png'));
  const w=window.open('','_print'); if(!w){toast('팝업이 차단되었습니다');return;}
  w.document.write(`<!doctype html><title>${esc(nb.title)}</title>
    <style>@page{size:A4;margin:0}body{margin:0}img{width:100%;display:block;page-break-after:always}</style>
    ${imgs.map(s=>`<img src="${s}">`).join('')}
    <scr`+`ipt>window.onload=()=>{setTimeout(()=>window.print(),300)}</scr`+`ipt>`);
  w.document.close();
}

/* ============================ 유틸 ============================ */
function esc(s){ return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function shade(hex,amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=clamp(r,0,255);g=clamp(g,0,255);b=clamp(b,0,255); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
let toastT;
function toast(msg){ let t=$('.toast'); if(!t){t=el('div','toast'); stage.appendChild(t);} t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1600); }

/* 키보드 단축키 */
addEventListener('keydown',e=>{
  if($('#editor').classList.contains('hidden'))return;
  if(tedit)return;
  const m=e.metaKey||e.ctrlKey;
  if(m&&e.key==='z'){ e.preventDefault(); e.shiftKey?redo():undo(); }
  else if(m&&e.key==='y'){ e.preventDefault(); redo(); }
  else if(e.key==='ArrowRight'&&!m){ if(pi<nb.pages.length-1)gotoPage(pi+1); }
  else if(e.key==='ArrowLeft'&&!m){ if(pi>0)gotoPage(pi-1); }
  else if(e.key==='Backspace'&&selection){ const arr=selection.strokes.slice(); page.strokes=page.strokes.filter(s=>!arr.includes(s)); pushUndo({t:'erase',strokes:arr}); clearSelection(); }
  else if('1234567'.includes(e.key)&&!m){ const map={'1':'pen','2':'highlighter','3':'eraser','4':'shape','5':'lasso','6':'text','7':'pan'}; setTool(map[e.key]); }
});

addEventListener('resize',()=>{ if(!$('#editor').classList.contains('hidden')){ scheduleRender(); } });
addEventListener('beforeunload',saveNow);

/* ============================ 시작 ============================ */
renderLibrary();

/* ============================ 앱 설치(PWA) — 오프라인 실행 ============================ */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
