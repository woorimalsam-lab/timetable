  if(!active) return;
  const q=localXY(ev), pp=toPage(q.x,q.y);
  const last=active.points[active.points.length-1]; if(!last) return;
  const thr=(active.tool==='highlighter'?1.2:0.45);
  if(Math.hypot(pp.x-last.x, pp.y-last.y) <= thr) return;
  const k=(ev.pointerType==='pen')?0.82:0.62;
  const sx=last.x+(pp.x-last.x)*k, sy=last.y+(pp.y-last.y)*k;
  active.points.push({x:sx, y:sy, p:pressure(ev,{x:sx,y:sy})});
  activeLastMove=(typeof performance!=='undefined'?performance.now():0);   // 직선화 홀드 판정용
}

function onMove(e){
  const l=localXY(e);
  if(e.pointerType==='pen' && penDown) penLastT=(typeof performance!=='undefined'?performance.now():0);
  if(nav.has(e.pointerId)){ navMove(e.pointerId,l); return; }   // 이동/확대 손가락
  if(e.pointerId!==activePid) return;                          // 그리는 포인터만 처리
  if(pointers.has(e.pointerId)){ l.type=e.pointerType; pointers.set(e.pointerId,l); }
  if(holdTimer && holdStart && Math.hypot(l.x-holdStart.x,l.y-holdStart.y)>10) clearHoldMenu();  // 펜이 움직이면 필기로 간주

  if(imgResize){ const dw=(l.x-imgResize.sx)/view.s; let nw=Math.max(30, imgResize.before.w+dw);
    imgResize.im.w=Math.round(nw); imgResize.im.h=Math.round(nw/imgResize.ar); scheduleRender(); return; }
  if(imgDrag){ const dx=(l.x-imgDrag.lx)/view.s, dy=(l.y-imgDrag.ly)/view.s;
    imgDrag.im.x+=dx; imgDrag.im.y+=dy; imgDrag.lx=l.x; imgDrag.ly=l.y; imgDrag.moved=true; scheduleRender(); return; }
  if(textWResize){ doWidthResize(l); return; }
  if(textDragSel){ const dx=(l.x-textDragSel.lx)/view.s, dy=(l.y-textDragSel.ly)/view.s;
    textSel.forEach(t=>{t.x+=dx;t.y+=dy;}); textDragSel.lx=l.x; textDragSel.ly=l.y; textDragSel.moved=true; scheduleRender(); return; }

  const p=toPage(l.x,l.y);
  if(active){
    if(active.tool==='shape'){
      if(active._shapeSnapped){ return; }   // 손으로 그려 변환된 도형은 크기 고정(펜을 떼면 확정)
      let bx=p.x,by=p.y;
      if(e.shiftKey && (active.kind==='rect'||active.kind==='ellipse')){ // 정사각/정원
        const a=active.points[0], s=Math.max(Math.abs(p.x-a.x),Math.abs(p.y-a.y));
        bx=a.x+Math.sign(p.x-a.x||1)*s; by=a.y+Math.sign(p.y-a.y||1)*s;
      }
      active.points[1]={x:bx,y:by}; scheduleRender(true); return;   // 그리는 중엔 캐시 재사용
    }
    if(active._lineSnap){   // 직선화된 획: 끝점이 펜을 따라옴
      const pp=toPage(l.x,l.y);
      active.points[1]=snapEnd(active.points[0], pp.x, pp.y);
      invalidateInk(active); scheduleRender(true); return;
    }
    // 빠른 획의 중간 좌표(coalesced)까지 모두 반영 → 끊김/각짐 없이 매끄럽게
    const evs=(e.getCoalescedEvents && e.getCoalescedEvents().length)?e.getCoalescedEvents():[e];
    for(const ev of evs) addActivePoint(ev);
    scheduleRender(true);   // 그리는 중엔 캐시 재사용(전체 재렌더 X)
    return;
  }
  if(eraseBatch){ eraseAt(p); return; }
  if(selDrag){ const dx=(l.x-selDrag.lx)/view.s, dy=(l.y-selDrag.ly)/view.s;
    selection.strokes.forEach(s=>{ s.points.forEach(pt=>{pt.x+=dx;pt.y+=dy;}); invalidateInk(s); });
    selection.dx+=dx; selection.dy+=dy; selDrag.lx=l.x; selDrag.ly=l.y; scheduleRender(); return; }
  if(textDrag){ const dx=(l.x-textDrag.lx)/view.s, dy=(l.y-textDrag.ly)/view.s;
    textDrag.t.x+=dx; textDrag.t.y+=dy; textDrag.lx=l.x; textDrag.ly=l.y; textDrag.moved=true; scheduleRender(); return; }
  if(lasso){ lasso.pts.push(l); lasso.page.push(p); scheduleRender(); return; }
}

function onUp(e){
  if(e.pointerType==='pen'){ penDown=false; }
  clearHoldMenu();
  pointers.delete(e.pointerId);
  if(nav.has(e.pointerId)){ navUp(e.pointerId); return; }   // 이동/확대 손가락 뗌
  if(e.pointerId!==activePid) return;
  activePid=null;
  _penUpT=(typeof performance!=='undefined'?performance.now():0);  // 어떤 포인터든 획이 끝난 시각(저장 지연 판단용)

  // 사진 이동/크기조절 마무리
  if(imgResize){ const im=imgResize.im, b=imgResize.before;
    if(im.w!==b.w||im.h!==b.h) pushUndo({t:'imgresize',image:im,before:b,after:{x:im.x,y:im.y,w:im.w,h:im.h}});
    imgResize=null; markDirty(); return; }
  if(imgDrag){ const im=imgDrag.im;
    if(imgDrag.moved) pushUndo({t:'imgmove',image:im,dx:im.x-imgDrag.ox,dy:im.y-imgDrag.oy});
    imgDrag=null; markDirty(); return; }

  // 시스템 제스처가 획을 강제 취소한 경우: 바로 커밋하지 않고 잠시 살려둠 → 0.8초 내 재접촉 시 이어 그림
  if(e.type==='pointercancel' && active && (active.tool==='pen'||active.tool==='ballpen'||active.tool==='glow'||active.tool==='highlighter') && active.points.length){
    suspended={stroke:active, page, until:_penUpT+800};
    active=null; scheduleRender(true);
    const s=suspended; setTimeout(()=>{ if(suspended===s) commitSuspended(); },850);
    return;
  }

  if(active){
    let committed=null;
    if(active.tool==='shape'){
      delete active._shapeSnapped;
      const A=active.points[0], B=active.points[1];
      if(Math.hypot(B.x-A.x,B.y-A.y) > 6){ page.strokes.push(active); pushUndo({t:'add',stroke:active}); committed=active; }
    } else if(active.points.length){ finalizeStroke(active); page.strokes.push(active); pushUndo({t:'add',stroke:active}); committed=active; }
    active=null;
    if(committed){
      if(!appendToStatic(committed)) staticValid=false;   // 캐시에 덧그림(전체 재렌더 X)
      // 펜으로 같은 자리를 톡톡 두 번(더블탭) → 도구 팔레트 (애플펜슬 더블탭 대체)
      if(e.pointerType==='pen' && committed.tool!=='shape' && strokeSpan(committed)*view.s < 9){
        const up=localXY(e);
        if(penTap && _penUpT-penTap.t<300 && Math.hypot(up.x-penTap.x,up.y-penTap.y)<12){
          removeDot(penTap.stroke); removeDot(committed); penTap=null;
          openHoldToolMenu(up.x,up.y); return;
        }
        penTap={t:_penUpT, x:up.x, y:up.y, stroke:committed};
      } else penTap=null;   // 획을 그으면 더블탭 후보 해제
    }
    scheduleRender(true); return;
  }
  if(eraseBatch){ if(eraseBatch.length) pushUndo({t:'erase',strokes:eraseBatch}); eraseBatch=null; return; }
  if(selDrag){ if(selection.dx||selection.dy) pushUndo({t:'move',strokes:selection.strokes.slice(),dx:selection.dx,dy:selection.dy}); selection.dx=selection.dy=0; selDrag=null; return; }
  if(textWResize){ const t=textWResize.t;
    if(t.w!==textWResize.beforeW || t.x!==textWResize.beforeX)
      pushUndo({t:'textbox',text:t,beforeW:textWResize.beforeW,beforeX:textWResize.beforeX,afterW:t.w,afterX:t.x});
    textWResize=null; scheduleRender(); return; }
  if(textDragSel){ if(textDragSel.moved){ const t0=textSel[0]; pushUndo({t:'textmovemulti',texts:textSel.slice(),dx:t0.x-textDragSel.ox[0],dy:t0.y-textDragSel.oy[0]}); }
    textDragSel=null; return; }
  if(textDrag){ const t=textDrag.t;
    if(textDrag.moved){ pushUndo({t:'textmove',text:t,dx:t.x-textDrag.ox,dy:t.y-textDrag.oy}); }
    else { openTextEditor(t.x,t.y,t); }
    textDrag=null; return; }
  if(lasso){ finishLasso(); return; }
}

function cancelActive(){
  active=null; eraseBatch=null; lasso=null; selDrag=null; textDrag=null; textWResize=null; textDragSel=null;
  scheduleRender();
}

/* ---------- 지우개 ---------- */
function eraseAt(p){
  const r=erSize/2; const removed=[];
  page.strokes=page.strokes.filter(st=>{
    const hit=pointsOf(st).some(pt=>Math.hypot(pt.x-p.x,pt.y-p.y) < r + st.size/2);
    if(hit){ removed.push(st); return false; } return true;
  });
  if(removed.length){ eraseBatch.push(...removed); scheduleRender(); }
}

/* ---------- 이동/확대 (손가락, 필기와 동시 가능) ---------- */
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function navStartPinch(){ const v=[...nav.values()]; const [a,b]=v;
  navPinch={d:dist(a,b)||1, cx:(a.x+b.x)/2, cy:(a.y+b.y)/2, s0:view.s, tx0:view.tx, ty0:view.ty}; }
function navDown(id,l){
  nav.set(id,{x:l.x,y:l.y});
  const now=(typeof performance!=='undefined'?performance.now():0);
  if(nav.size===1){ navPan={id,x:l.x,y:l.y,x0:l.x,y0:l.y,t0:now}; navPinch=null; }
  else if(nav.size===2){ navPan=null; navStartPinch(); }
}
function navMove(id,l){
  if(!nav.has(id))return; nav.set(id,{x:l.x,y:l.y});
  if(penContact()) return;   // 펜이 닿아 있는 동안엔 화면 고정(남은 손바닥 드리프트 방지)
  if(nav.size>=2 && navPinch){
    const v=[...nav.values()]; const [a,b]=v;
    const d=dist(a,b), cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
    const s=clamp(navPinch.s0*d/navPinch.d, 0.15, 8);
    const wx=(navPinch.cx-navPinch.tx0)/navPinch.s0, wy=(navPinch.cy-navPinch.ty0)/navPinch.s0;
    view.s=s; view.tx=cx-wx*s; view.ty=cy-wy*s; clampView(); updateZoom(); scheduleRender();
  } else if(navPan && navPan.id===id){
    view.tx+=l.x-navPan.x; view.ty+=l.y-navPan.y; navPan.x=l.x; navPan.y=l.y; clampView(); scheduleRender();
  }
}
function navUp(id){
  const p=nav.get(id);
  const now=(typeof performance!=='undefined'?performance.now():0);
  // 화면 맞춤 배율에서 좌우로 '빠르게' 쓸면 페이지 넘김 (확대 중·펜 사용 직후·느린 끌기는 제외)
  if(navPan && navPan.id===id && p && view.s<=fitScale*1.05
     && (now-(navPan.t0||0))<700 && (now-_penUpT)>350){
    const dx=p.x-navPan.x0, dy=p.y-navPan.y0;
    if(Math.abs(dx)>70 && Math.abs(dx)>Math.abs(dy)*1.4){
      if(dx<0 && pi<nb.pages.length-1) gotoPage(pi+1);
      else if(dx>0 && pi>0) gotoPage(pi-1);
    }
  }
  nav.delete(id);
  if(nav.size===0){ navPan=null; navPinch=null; }
  else if(nav.size===1){ const [rid]=[...nav.keys()]; const rp=nav.get(rid); navPan={id:rid,x:rp.x,y:rp.y,x0:rp.x,y0:rp.y,t0:now}; navPinch=null; }
  else { navStartPinch(); }
}

/* 데스크톱: 휠 확대/축소 + 트랙패드 패닝 */
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey || e.metaKey){
    const l=localXY(e); const w=toPage(l.x,l.y);
    view.s=clamp(view.s*(1-e.deltaY*0.0016),0.15,8);
    view.tx=l.x-w.x*view.s; view.ty=l.y-w.y*view.s; clampView(); updateZoom(); scheduleRender();
  }else{ view.tx-=e.deltaX; view.ty-=e.deltaY; clampView(); scheduleRender(); }
},{passive:false});

/* ============================ 올가미 선택 ============================ */
function drawLassoPath(){
  if(!lasso||lasso.pts.length<2)return;
  ctx.save(); ctx.setTransform(window.devicePixelRatio||1,0,0,window.devicePixelRatio||1,0,0);
  ctx.beginPath(); ctx.moveTo(lasso.pts[0].x,lasso.pts[0].y);
  lasso.pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.setLineDash([6,5]); ctx.strokeStyle=cssVar('--accent'); ctx.lineWidth=1.5; ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}
function finishLasso(){
  const poly=lasso.page; const picked=[]; const pickedText=[];
  if(poly.length>=3){
    for(const st of page.strokes){
      const pts=pointsOf(st); const inside=pts.reduce((n,pt)=>n+(pointInPoly(pt,poly)?1:0),0);
      if(inside>=Math.max(1,Math.ceil(pts.length*0.55))) picked.push(st);   // 과반 포함이면 선택(촘촘한 올가미도 획을 놓치지 않음)
    }
    for(const t of page.texts){ const bb=textBBox(t);
      const c={x:(bb.x+bb.x2)/2,y:(bb.y+bb.y2)/2};
      if(pointInPoly(c,poly)) pickedText.push(t);   // 텍스트는 중심이 올가미 안이면 선택
    }
  }
  lasso=null; clearSelection(); clearTextSel();
  if(pickedText.length){ selectTexts(pickedText); }   // 텍스트를 묶으면 텍스트 위에 메뉴 표시
  else if(picked.length){ selection={strokes:picked,dx:0,dy:0}; }
  scheduleRender();
}
function pointInPoly(p,poly){
  let c=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const a=poly[i],b=poly[j];
    if(((a.y>p.y)!==(b.y>p.y)) && (p.x < (b.x-a.x)*(p.y-a.y)/(b.y-a.y)+a.x)) c=!c;
  }
  return c;
}
function pointInSel(p){ if(!selection)return false; const bb=selBBox(); return p.x>=bb.x-10&&p.x<=bb.x2+10&&p.y>=bb.y-10&&p.y<=bb.y2+10; }
function selBBox(){
  let a=1e9,b=1e9,cX=-1e9,dY=-1e9;
  selection.strokes.forEach(st=>{const bb=strokeBBox(st);a=Math.min(a,bb.x);b=Math.min(b,bb.y);cX=Math.max(cX,bb.x2);dY=Math.max(dY,bb.y2);});
  return {x:a,y:b,x2:cX,y2:dY};
}
function drawSelectionOutline(c){
  if(!selection)return; const bb=selBBox();
  c.save(); c.setLineDash([7,5]); c.strokeStyle=cssVar('--accent'); c.lineWidth=1.5/view.s;
  c.strokeRect(bb.x-10,bb.y-10,(bb.x2-bb.x)+20,(bb.y2-bb.y)+20); c.setLineDash([]); c.restore();
}
function clearSelection(){ if(selection){selection=null; $('#selbar')?.remove(); scheduleRender();} }
function positionSelbar(){
  let bar=$('#selbar');
  if(!selection){ bar?.remove(); return; }
  if(!bar){ bar=el('div'); bar.id='selbar';
    bar.innerHTML=`<button data-a="ocr">✎→T 텍스트 변환</button><button data-a="dup">⧉ 복제</button><button data-a="del" class="danger">🗑 삭제</button><button data-a="done">✓ 완료</button>`;
    stage.appendChild(bar);
    bar.onclick=e=>{ const a=e.target.closest('button')?.dataset.a; if(!a)return;
      if(a==='del'){ const arr=selection.strokes.slice(); page.strokes=page.strokes.filter(s=>!arr.includes(s)); pushUndo({t:'erase',strokes:arr}); clearSelection(); }
      else if(a==='dup'){ const copies=selection.strokes.map(s=>({id:uid(),tool:s.tool,kind:s.kind,color:s.color,size:s.size,points:s.points.map(p=>({x:p.x+24,y:p.y+24,p:p.p}))}));
        copies.forEach(cp=>{page.strokes.push(cp); pushUndo({t:'add',stroke:cp});}); selection={strokes:copies,dx:0,dy:0}; scheduleRender(); }
      else if(a==='ocr'){ openConvert(); }
      else if(a==='done'){ clearSelection(); }
    };
  }
  const bb=selBBox(); const s=toScreen(bb.x-10,bb.y-10);
  bar.style.left=clamp(s.x,8,stage.clientWidth-260)+'px';
  bar.style.top=Math.max(8, s.y-46)+'px';
}

/* ============================ 손글씨 → 텍스트 인식 ============================ */
// Google Input Tools 필기 인식(무료·키 불필요, 인식 시 인터넷 필요). 한국어/영어 지원.
// 선택 영역을 '줄'로 분리해 각 줄을 인식 → 여러 줄 텍스트로 합침.
function segmentLines(strokes){
  // idx = 원래(=쓴) 순서. 인식은 쓴 순서를 유지할수록 정확도가 높다.
  const items=strokes.map((s,idx)=>{const bb=strokeBBox(s);return{s,idx,cy:(bb.y+bb.y2)/2,h:bb.y2-bb.y};});
  if(!items.length) return [];
  const avgH=items.reduce((a,b)=>a+b.h,0)/items.length;
  const thr=Math.max(30, avgH*1.1);   // 한 줄이 잘못 쪼개지지 않도록 넉넉한 임계값
  const byY=[...items].sort((a,b)=>a.cy-b.cy);
  const lines=[]; let cur=[], lineMax=-1e9;
  for(const it of byY){
    if(cur.length && it.cy-lineMax>thr){ lines.push(cur); cur=[]; }
    cur.push(it); lineMax=Math.max(lineMax, it.cy);
  }
  if(cur.length) lines.push(cur);
  // 줄들은 위→아래, 각 줄 내부는 쓴 순서(idx)대로
  lines.sort((a,b)=>Math.min(...a.map(o=>o.cy))-Math.min(...b.map(o=>o.cy)));
  return lines.map(ln=>ln.sort((a,b)=>a.idx-b.idx).map(o=>o.s));
}
function buildInkBody(strokes, lang){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  strokes.forEach(st=>pointsOf(st).forEach(p=>{minx=Math.min(minx,p.x);miny=Math.min(miny,p.y);maxx=Math.max(maxx,p.x);maxy=Math.max(maxy,p.y);}));
  const w=Math.max(1,maxx-minx), h=Math.max(1,maxy-miny);
  const scale=clamp(240/h, 0.6, 8);   // 표준 높이(~240)로 정규화 → 크게/작게 써도 인식 안정
  let clock=0;                        // 타임스탬프는 스트로크를 넘어 단조 증가(연속 필기)
  const ink=strokes.map(st=>{const pts=pointsOf(st);const xs=[],ys=[],ts=[];
    pts.forEach(p=>{xs.push(Math.round((p.x-minx)*scale));ys.push(Math.round((p.y-miny)*scale));ts.push(clock);clock+=8;}); clock+=40; return [xs,ys,ts];});
  return {options:"enable_pre_space",requests:[{
    writing_guide:{writing_area_width:Math.round(w*scale), writing_area_height:Math.round(h*scale)},
    ink, language:lang}]};
}
let _recErr='';   // 마지막 인식 실패 원인(진단 표시용)
async function tryFetchRecognize(url, body, signal){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),7000);
  const onAbort=()=>ctrl.abort();
  if(signal){ if(signal.aborted) ctrl.abort(); else signal.addEventListener('abort',onAbort); }
  try{
    const res=await fetch(url,{method:'POST',body,signal:ctrl.signal});
    if(!res.ok){ _recErr=`HTTP ${res.status}`; return null; }
    const txt=await res.text();
    let data; try{ data=JSON.parse(txt); }catch(e){ _recErr='응답 형식 오류'; return null; }
    if(data[0]==='SUCCESS' && data[1] && data[1][0] && data[1][0][1] && data[1][0][1].length) return data[1][0][1];
    _recErr='결과 없음'; return null;
  }catch(e){ _recErr=(e&&e.name==='AbortError')?'시간 초과':'네트워크/CORS 차단'; return null; }
  finally{ clearTimeout(timer); if(signal) signal.removeEventListener('abort',onAbort); }
}
// 여러 후보 요청을 '동시에' 던지고 가장 먼저 성공한 결과를 채택 → 순차 타임아웃 누적 제거
function firstSuccess(makers){
  return new Promise(resolve=>{
    const ac=new AbortController(); let left=makers.length, done=false;
    if(!left) return resolve([]);
    const finish=(v)=>{ if(done) return; done=true; ac.abort(); resolve(v); };
    makers.forEach(mk=>mk(ac.signal).then(v=>{ if(v&&v.length) finish(v); else if(--left===0&&!done){ done=true; resolve([]); } })
                                     .catch(()=>{ if(--left===0&&!done){ done=true; resolve([]); } }));
  });
}
function recognizeUrls(lang){
  const direct=[`https://inputtools.google.com/request?itc=${lang}-t-i0-handwrit&app=demopage`,
                'https://www.google.com/inputtools/request?ime=handwriting&app=mobilesearch&dbg=1&cs=1&oe=UTF-8'];
  const urls=[];
  for(const u of direct){
    urls.push(u);                                                        // 직접(일부 네트워크에서 통함)
    urls.push('https://corsproxy.io/?url='+encodeURIComponent(u));       // CORS 프록시들 — 동시에
    urls.push('https://api.allorigins.win/raw?url='+encodeURIComponent(u));
    urls.push('https://thingproxy.freeboard.io/fetch/'+u);
  }
  return urls;
}
async function recognizeGroup(strokes, lang){
  if(window.__mockRecognize) return await window.__mockRecognize(strokes,lang);
  const body=JSON.stringify(buildInkBody(strokes,lang));
  return await firstSuccess(recognizeUrls(lang).map(u=>(sig)=>tryFetchRecognize(u,body,sig)));
}
// 한 줄 인식: 선택 언어 실패 시 다른 언어로 자동 재시도
async function recognizeLine(strokes, lang){
  let c=await recognizeGroup(strokes,lang);
  if(!c.length){ const alt=lang==='ko'?'en':'ko'; c=await recognizeGroup(strokes,alt); }
  return c;
}
// 반환: {text:'여러 줄', cands:[첫 줄 후보들], lines:n}
async function recognizeInk(strokes, lang){
  _recErr='';
  const lines=segmentLines(strokes);
  if(lines.length<=1){ const c=await recognizeLine(strokes,lang); return {text:(c[0]||''), cands:c, lines:1}; }
  const results=await Promise.all(lines.map(ln=>recognizeLine(ln,lang)));   // 여러 줄 동시 인식
  const outs=results.map(c=>c[0]||'');
  const first=results.find(c=>c.length)||[];
  return {text:outs.join('\n'), cands:first, lines:lines.length};
}

function insertText(str, strokes, bb){
  const col=commonColor(strokes);
  const nlines=str.split('\n').length;
  const size=clamp((bb.y2-bb.y)/nlines*0.78, 18, 90);   // 여러 줄이면 줄 높이에 맞춰 글자 크기 계산
  const t={id:uid(), x:bb.x, y:bb.y, text:str, color:col, size:Math.round(size)};
  page.strokes=page.strokes.filter(s=>!strokes.includes(s));
  page.texts.push(t);
  pushUndo({t:'convert',strokes:strokes.slice(),text:t});
  clearSelection(); selectTexts([t]); scheduleRender();   // 변환 직후 바로 크기 조정/메뉴 가능
  toastUndo('텍스트로 바꿨어요');   // 방금 변환 → '취소'로 손글씨 복원
}
function commonColor(strokes){ const m={}; strokes.forEach(s=>{m[s.color]=(m[s.color]||0)+1;});
  return Object.keys(m).sort((a,b)=>m[b]-m[a])[0]||COLORS[0]; }

/* ============================ 텍스트 선택 · 크기 조정 · 메뉴 ============================ */
function textBBox(t){
  ctx.save(); const lines=layoutText(ctx,t); const lh=textLineH(t);
  let w=t.w; if(w==null){ w=0; lines.forEach(ln=>{ w=Math.max(w, ctx.measureText(ln).width); }); }
  ctx.restore();
  return {x:t.x, y:t.y, x2:t.x+Math.max(w,t.size*0.6), y2:t.y+lines.length*lh};
}
function textUnionBBox(){ let a=1e9,b=1e9,cX=-1e9,dY=-1e9;
  textSel.forEach(t=>{const bb=textBBox(t);a=Math.min(a,bb.x);b=Math.min(b,bb.y);cX=Math.max(cX,bb.x2);dY=Math.max(dY,bb.y2);});
  return {x:a,y:b,x2:cX,y2:dY}; }
function pointInTextUnion(p){ if(!textSel.length)return false; const bb=textUnionBBox();
  return p.x>=bb.x-8&&p.x<=bb.x2+8&&p.y>=bb.y-8&&p.y<=bb.y2+8; }
// 단일 텍스트 선택 시 좌/우 너비 조절 핸들(스크린 좌표)
function textSideHandles(){ if(textSel.length!==1)return null; const bb=textBBox(textSel[0]); const my=(bb.y+bb.y2)/2;
  return {l:toScreen(bb.x-10,my), r:toScreen(bb.x2+10,my)}; }
function selectTexts(arr){ clearSelection(); textSel=arr.slice(); scheduleRender(); }
function clearTextSel(){ if(textSel.length){ textSel=[]; $('#txtbar')?.remove(); $('#txtcolpop')?.remove(); scheduleRender(); } }
function drawTextSelection(c){
  if(!textSel.length)return; const bb=textUnionBBox();
  c.save(); c.strokeStyle=cssVar('--accent'); c.lineWidth=1.5/view.s;
  c.strokeRect(bb.x-8,bb.y-6,(bb.x2-bb.x)+16,(bb.y2-bb.y)+12);
  if(textSel.length===1){   // 좌/우 너비 핸들(글상자)
    const my=(bb.y+bb.y2)/2, r=7/view.s;
    [[bb.x-8,my],[bb.x2+8,my]].forEach(([hx,hy])=>{
      c.fillStyle='#fff'; c.beginPath(); c.arc(hx,hy,r,0,7); c.fill();
      c.lineWidth=2/view.s; c.stroke(); });
  }
  c.restore();
}
function beginWidthResize(side){ const t=textSel[0]; const bb=textBBox(t);
  if(t.w==null) t.w=Math.round(bb.x2-bb.x);
  textWResize={side, t, beforeW:t.w, beforeX:t.x, rightEdge:t.x+t.w}; }
function doWidthResize(l){
  const t=textWResize.t, p=toPage(l.x,l.y), minW=Math.max(40,t.size*1.2);
  if(textWResize.side==='r'){ t.w=clamp(Math.round(p.x-t.x),minW,5000); }
  else { const nx=Math.min(p.x, textWResize.rightEdge-minW); t.x=Math.round(nx); t.w=Math.round(textWResize.rightEdge-nx); }
  scheduleRender();
}

function cycleFont(){ const before=textSel.map(t=>t.font||'sans');
  const nv=FONT_ORDER[(FONT_ORDER.indexOf(textSel[0].font||'sans')+1)%FONT_ORDER.length];
  textSel.forEach(t=>t.font=nv); pushUndo({t:'textprop',prop:'font',texts:textSel.slice(),before,after:textSel.map(t=>t.font)});

function syncTxtbar(){ const t=textSel[0]; if(!t)return;

function toggleTextProp(prop){ const before=textSel.map(t=>!!t[prop]); const nv=!textSel[0][prop];
  textSel.forEach(t=>t[prop]=nv); pushUndo({t:'textprop',prop,texts:textSel.slice(),before,after:textSel.map(t=>!!t[prop])}); syncTxtbar(); scheduleRender(); }
function cycleAlign(){ const order=['left','center','right']; const before=textSel.map(t=>t.align||'left');
  const nv=order[(order.indexOf(textSel[0].align||'left')+1)%3];
  textSel.forEach(t=>t.align=nv); pushUndo({t:'textprop',prop:'align',texts:textSel.slice(),before,after:textSel.map(t=>t.align)}); toast('정렬: '+({left:'왼쪽',center:'가운데',right:'오른쪽'}[nv])); scheduleRender(); }

let tedit=null, teditText=null, teditNew=false, teditBefore=null;
function hitText(p){
  for(let i=page.texts.length-1;i>=0;i--){ const t=page.texts[i];
    const lines=t.text.split('\n'); const lh=t.size*1.3;
    ctx.font=`${t.size}px sans-serif`;
    let w=0; lines.forEach(ln=>{w=Math.max(w,ctx.measureText(ln).width);});
    const h=lines.length*lh;
    if(p.x>=t.x-4&&p.x<=t.x+w+8&&p.y>=t.y-4&&p.y<=t.y+h+4) return t;
  }
  return null;
}
function applyEditorStyle(ta,t){
  const fs=t.size*view.s, sc=toScreen(t.x,t.y);
  ta.style.left=sc.x+'px'; ta.style.top=sc.y+'px'; ta.style.color=t.color;
  ta.style.font=`${t.italic?'italic ':''}${t.bold?'700':'400'} ${fs}px ${FONTS[t.font]||FONTS.sans}`;
  ta.style.textAlign=t.align||'left';
  const fixedW = t.w ? t.w*view.s : null;
  if(fixedW){ ta.style.width=fixedW+'px'; ta.style.whiteSpace='pre-wrap'; }
  else { ta.style.whiteSpace='pre'; ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px';
    ta.style.width='auto'; ta.style.width=Math.min(ta.scrollWidth+8, PAGE_W*view.s)+'px'; }
  ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px';
}
function openTextEditor(px,py,existing){
  commitText();            // 편집 중이던 텍스트가 있으면 먼저 저장
  let t=existing;
  if(!t){ t={id:uid(), x:px, y:py, text:'', color, size:34, align:'left', font:'sans'}; page.texts.push(t); teditNew=true; }
  else teditNew=false;
  teditText=t; teditBefore = existing? existing.text : ''; textSel=[t];
  const ta=el('textarea'); ta.id='tedit';
  ta.value=t.text; ta.rows=1; ta.style.minWidth='40px';
  applyEditorStyle(ta,t);
  stage.appendChild(ta); tedit=ta;
  const onInput=()=>{ t.text=ta.value; applyEditorStyle(ta,t); scheduleRender(); };
  ta.addEventListener('input',onInput);
  ta.addEventListener('blur',commitText);
  ta.addEventListener('keydown',e=>{ if(e.key==='Escape'){e.preventDefault(); ta.value=teditBefore; t.text=teditBefore; ta.blur();} });
  setTimeout(()=>{ applyEditorStyle(ta,t); ta.focus();
    try{ ta.setSelectionRange(ta.value.length,ta.value.length); }catch(_){}
    scheduleRender(); },0);
}
function syncEditorFromToolbar(){ if(tedit&&teditText){ applyEditorStyle(tedit,teditText); tedit.focus(); } }
function commitText(){
  if(!tedit) return;
  const val=tedit.value, t=teditText, wasNew=teditNew, before=teditBefore;
  closeTextEditor();
  if(!t) return;
  t.text=val;
  if(val.trim()===''){
    page.texts=page.texts.filter(x=>x!==t);
    if(!wasNew) pushUndo({t:'textdel',text:t});
    clearTextSel();
  } else if(wasNew){
    pushUndo({t:'textadd',text:t});
    toastUndo('텍스트 입력됨');   // 방금 만든 글상자 → '취소'로 제거
  } else if(val!==before){
    pushUndo({t:'textedit',text:t,before,after:val});
  } else { markDirty(); }
  scheduleRender();
}
function closeTextEditor(){ if(tedit){ const ta=tedit; tedit=null; teditText=null; teditNew=false; ta.removeEventListener('blur',commitText); ta.remove(); } }

function refreshPageUI(){
  $('#pageInd').textContent=`${pi+1} / ${nb.pages.length}`;
  $('#pgPrev').disabled = pi<=0;
  $('#pgNext').disabled = pi>=nb.pages.length-1;
  updateUndoUI();
}
function gotoPage(i){
  commitSuspended(); commitText(); clearSelection(); clearTextSel(); clearImgSel();
  pi=clamp(i,0,nb.pages.length-1); page=nb.pages[pi];
  refreshPageUI(); fitPage(); scheduleRender();
  document.querySelectorAll('#plist .thumb').forEach((t,k)=>t.classList.toggle('on',k===pi));
}
function buildPageList(){
  const list=$('#plist'); list.innerHTML='';
  nb.pages.forEach((pg,k)=>{
    const box=el('div','thumb'+(k===pi?' on':''));
    const cv=el('canvas'); cv.width=140; cv.height=Math.round(140*PAGE_H/PAGE_W);
    renderThumb(pg, cv);
    box.appendChild(cv);
    const n=el('div','n'); n.textContent=k+1; box.appendChild(n);
    const del=el('div','del'); del.textContent='×'; box.appendChild(del);
    box.onclick=e=>{ if(e.target===del){ delPage(k); } else gotoPage(k); };
    box.dataset.k=k;
    list.appendChild(box);
  });
}
function refreshThumb(k){
  const box=document.querySelector(`#plist .thumb[data-k="${k}"]`);
  if(box){ renderThumb(nb.pages[k], box.querySelector('canvas')); }
}
function delPage(k){
  if(nb.pages.length<=1){ toast('마지막 페이지는 삭제할 수 없어요'); return; }
  if(!confirm(`${k+1}쪽을 삭제할까요?`)) return;
  const rp=nb.pages[k]; if(idb){ if(rp.bgId) idbDel('bgs',rp.bgId).catch(()=>{}); idbDel('pgs',rp.id).catch(()=>{}); } bgImgs.delete(rp.id);
  nb.pages.splice(k,1); if(pi>=nb.pages.length)pi=nb.pages.length-1;
  page=nb.pages[pi]; buildPageList(); refreshPageUI(); scheduleRender(); markDirty();
}
function renderThumb(pg, cv){
  const c=cv.getContext('2d'); const sc=cv.width/PAGE_W;
  c.setTransform(1,0,0,1,0,0); c.clearRect(0,0,cv.width,cv.height);
  c.fillStyle=paperFill(pg); c.fillRect(0,0,cv.width,cv.height);
  c.save(); c.scale(sc,sc);
  if(!drawPageBg(c,pg)) drawTemplate(c,pg.template,pg.paper);
  drawImages(c,pg);
  pg.strokes.forEach(s=>drawStroke(c,s));
  pg.texts.forEach(t=>drawTextObj(c,t));
  c.restore();
}

function miniTpl(box,t){
  const c=el('canvas'); c.width=34;c.height=24; const g=c.getContext('2d');
  g.fillStyle='#fff'; g.fillRect(0,0,34,24); g.strokeStyle='#9db'; g.strokeStyle='rgba(60,80,120,.4)'; g.lineWidth=.6;
  if(t==='lined'){for(let y=6;y<24;y+=6){g.beginPath();g.moveTo(3,y);g.lineTo(31,y);g.stroke();}}
  else if(t==='narrow'){for(let y=4;y<24;y+=4){g.beginPath();g.moveTo(3,y);g.lineTo(31,y);g.stroke();}}
  else if(t==='todo'){for(let y=6;y<24;y+=7){g.strokeRect(4,y-3,4,4);g.beginPath();g.moveTo(11,y-1);g.lineTo(31,y-1);g.stroke();}}
  else if(t==='grid'){for(let x=4;x<34;x+=6){g.beginPath();g.moveTo(x,0);g.lineTo(x,24);g.stroke();}for(let y=4;y<24;y+=6){g.beginPath();g.moveTo(0,y);g.lineTo(34,y);g.stroke();}}
  else if(t==='dots'){g.fillStyle='rgba(60,80,120,.5)';for(let x=5;x<34;x+=6)for(let y=5;y<24;y+=6){g.beginPath();g.arc(x,y,.9,0,7);g.fill();}}
  else if(t==='cornell'){g.beginPath();g.moveTo(11,2);g.lineTo(11,19);g.stroke();g.beginPath();g.moveTo(3,19);g.lineTo(31,19);g.stroke();}
  box.appendChild(c);
}

function pageToCanvas(pg, scale){
  scale=scale||2;
  const cv=el('canvas'); cv.width=PAGE_W*scale; cv.height=PAGE_H*scale;
  const c=cv.getContext('2d'); c.scale(scale,scale);
  c.fillStyle=paperFill(pg); c.fillRect(0,0,PAGE_W,PAGE_H);
  if(!drawPageBg(c,pg)) drawTemplate(c,pg.template,pg.paper);
  drawImages(c,pg);
  pg.strokes.forEach(s=>drawStroke(c,s)); pg.texts.forEach(t=>drawTextObj(c,t));
  return cv;
}
/* ---------- PDF 가져오기: 각 쪽을 이미지 배경으로 변환해 새 노트 생성 ---------- */
let _pdfjs=null;
async function loadPdfjs(){
  if(_pdfjs) return _pdfjs;
  _pdfjs = await import('./vendor/pdf.min.mjs');
  _pdfjs.GlobalWorkerOptions.workerSrc = 'vendor/pdf.worker.min.mjs';
  return _pdfjs;
}
const PDF_MAX_PAGES=200;      // IndexedDB 사용 시 (배경은 쪽당 Blob으로 저장)
const PDF_MAX_PAGES_LS=30;    // localStorage 폴백 시 (약 5MB 보호)
async function importPDF(file){
  toast('PDF 여는 중…');
  let doc;
  try{
    const pdfjs=await loadPdfjs();
    doc=await pdfjs.getDocument({data:await file.arrayBuffer()}).promise;
  }catch(e){ toast('PDF를 열 수 없어요'); return; }
  const cap = idb ? PDF_MAX_PAGES : PDF_MAX_PAGES_LS;
  const n=Math.min(doc.numPages, cap);
  const pages=[];
  try{
    for(let i=1;i<=n;i++){
      toast(`PDF 변환 중… ${i}/${n}쪽`);
      const pg=await doc.getPage(i);
      const vp1=pg.getViewport({scale:1});
      const scale=Math.min(PAGE_W/vp1.width, PAGE_H/vp1.height);
      const vp=pg.getViewport({scale});
      const cv=el('canvas'); cv.width=Math.round(vp.width); cv.height=Math.round(vp.height);
      const cx=cv.getContext('2d'); cx.fillStyle='#fff'; cx.fillRect(0,0,cv.width,cv.height);
      await pg.render({canvasContext:cx, viewport:vp}).promise;
      const p=newPage('blank','white');
      // PDF 텍스트 레이어 추출 → 검색 가능하게 저장 (스캔 이미지 PDF는 텍스트 없음)
      try{ const tc=await pg.getTextContent();
        const txt=tc.items.map(it=>it.str).join(' ').replace(/\s+/g,' ').trim();
        if(txt) p.pdfText=txt;
      }catch(e){}
      if(idb){ const bl=await new Promise(r=>cv.toBlob(r,'image/jpeg',0.8)); if(!bl) throw new Error('toBlob'); await idbPut('bgs',p.id,bl); p.bgId=p.id; }
      else p.bg=cv.toDataURL('image/jpeg',0.75);
      pages.push(p);
    }
  }catch(e){
    if(idb) for(const p of pages) if(p.bgId) idbDel('bgs',p.bgId).catch(()=>{});
    toast('PDF 변환 중 오류가 발생했어요 (기기 저장 공간을 확인해 주세요)'); return;
  }
  if(!pages.length){ toast('가져올 페이지가 없어요'); return; }
  const nbNew={id:uid(), title:(file.name||'PDF').replace(/\.pdf$/i,''),
               cover:COVERS[db.notebooks.length%COVERS.length],
               template:'blank', paper:'white', created:Date.now(), updated:Date.now(), pages};
  if(curFolder) nbNew.folder=curFolder;
  db.notebooks.unshift(nbNew);
  if(idb){ dirtyNbs.add(nbNew.id); nbNew.pages.forEach(p=>dirtyPgs.add(p.id)); saveNow(); }
  else{
    // localStorage 폴백: 안 들어가면 되돌리고 알림
    try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
    catch(e){ db.notebooks=db.notebooks.filter(x=>x!==nbNew); toast('PDF가 너무 커서 저장할 수 없어요 (쪽수가 적은 PDF로 시도해 보세요)'); return; }
  }
  if(doc.numPages>cap) toast(`처음 ${cap}쪽만 가져왔어요 (${doc.numPages}쪽 중)`);
  renderLibrary(); open(nbNew);
}

function blobToDataURL(bl){ return new Promise(r=>{ const fr=new FileReader(); fr.onload=()=>r(fr.result); fr.readAsDataURL(bl); }); }
async function buildBackup(){
  const data={ app:'suyeonnote', ver:1, exported:Date.now(),
    theme:db.theme, folders:db.folders||[],
    notebooks: db.notebooks.map(n=>JSON.parse(JSON.stringify(n,(k,v)=>(k==='_undo'||k==='_redo')?undefined:v))) };

    if(p.bgId&&idb){ const bl=await idbGet('bgs',p.bgId).catch(()=>null); if(bl) bgs[p.bgId]=await blobToDataURL(bl); }
  }

}

async function importBackup(file){
  let data=null;
  try{ data=JSON.parse(await file.text()); }catch(e){}
  if(!data || data.app!=='suyeonnote' || !Array.isArray(data.notebooks)){ toast('수연노트 백업 파일이 아니에요'); return; }
  if(!confirm(`백업의 노트 ${data.notebooks.length}권을 가져올까요?\n(이 기기의 기존 노트는 그대로 두고 추가됩니다)`)) return;
  toast('가져오는 중…');
  // 폴더: 새 id로 추가하고 매핑
  const fmap={};
  for(const f of (data.folders||[])){ const nf={id:uid(),name:f.name,color:f.color}; fmap[f.id]=nf.id; (db.folders=db.folders||[]).push(nf); }
  for(const n of data.notebooks){
    n.id=uid();
    if(n.folder) n.folder=fmap[n.folder]||undefined;
    for(const p of n.pages){
      const oldBg=p.bgId; p.id=uid(); delete p.bgId;
      p.strokes=p.strokes||[]; p.texts=p.texts||[]; p.images=p.images||[];
      p.images.forEach(im=>{ im.id=uid(); });
      if(oldBg && data.bgs && data.bgs[oldBg] && idb){
        try{ const bl=await (await fetch(data.bgs[oldBg])).blob(); await idbPut('bgs',p.id,bl); p.bgId=p.id; }catch(e){}
      } else if(p.bg && idb){   // 아주 옛 형식(dataURL 내장) 지원
        try{ const bl=await (await fetch(p.bg)).blob(); await idbPut('bgs',p.id,bl); p.bgId=p.id; delete p.bg; }catch(e){}
      }
      dirtyPgs.add(p.id);
    }
    dirtyNbs.add(n.id);
  }
  db.notebooks.unshift(...data.notebooks);
  saveNow(); renderLibrary();
  toast(`노트 ${data.notebooks.length}권을 가져왔어요`);
}

/* ---------- 진짜 PDF 파일 생성 (라이브러리 없이) → 공유 시트로 Drive·카카오톡 등에 저장 ---------- */
function buildPdf(imgs, W, H){    // imgs: [{data:Uint8Array(JPEG), w, h}]
  const enc=new TextEncoder(); const chunks=[]; let off=0; const offs=[];
  const put=x=>{ const b=(typeof x==='string')?enc.encode(x):x; chunks.push(b); off+=b.length; };
  put('%PDF-1.4\n');
  const n=imgs.length, last=2+n*3;
  offs[1]=off; put('1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj\n');
  offs[2]=off; put(`2 0 obj<</Type/Pages/Kids[${imgs.map((_,i)=>`${3+i*3} 0 R`).join(' ')}]/Count ${n}>>endobj\n`);
  imgs.forEach((im,i)=>{
    const pn=3+i*3, cn=pn+1, xn=pn+2;
    offs[pn]=off; put(`${pn} 0 obj<</Type/Page/Parent 2 0 R/MediaBox[0 0 ${W} ${H}]/Resources<</XObject<</Im${i} ${xn} 0 R>>>>/Contents ${cn} 0 R>>endobj\n`);
    const cs=`q ${W} 0 0 ${H} 0 0 cm /Im${i} Do Q`;
    offs[cn]=off; put(`${cn} 0 obj<</Length ${cs.length}>>stream\n${cs}\nendstream endobj\n`);
    offs[xn]=off; put(`${xn} 0 obj<</Type/XObject/Subtype/Image/Width ${im.w}/Height ${im.h}/ColorSpace/DeviceRGB/BitsPerComponent 8/Filter/DCTDecode/Length ${im.data.length}>>stream\n`);
    put(im.data); put('\nendstream endobj\n');
  });
  const xr=off;
  let x=`xref\n0 ${last+1}\n0000000000 65535 f \n`;
  for(let k=1;k<=last;k++) x+=String(offs[k]).padStart(10,'0')+' 00000 n \n';
  put(x); put(`trailer<</Size ${last+1}/Root 1 0 R>>\nstartxref\n${xr}\n%%EOF`);
  return new Blob(chunks,{type:'application/pdf'});
}
function notebookPdfBlob(){
  const imgs=nb.pages.map(pg=>{
    const cv=pageToCanvas(pg,1.6);
    const bin=atob(cv.toDataURL('image/jpeg',0.85).split(',')[1]);
    const u8=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
    return {data:u8, w:cv.width, h:cv.height};
  });
  return buildPdf(imgs, 595.28, 841.89);   // A4
}

/* ============================ 유틸 ============================ */
function esc(s){ return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function shade(hex,amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=clamp(r,0,255);g=clamp(g,0,255);b=clamp(b,0,255); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
let toastT;
function toast(msg){ let t=$('.toast'); if(!t){t=el('div','toast'); stage.appendChild(t);}
  t.classList.remove('has-action'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1600); }
// 방금 한 동작을 바로 되돌리는 '취소' 버튼이 달린 알림 (입력·변환 직후)
function toastUndo(msg, onUndo){
  let t=$('.toast'); if(!t){t=el('div','toast'); stage.appendChild(t);}
  t.textContent=''; t.classList.add('has-action','show');
  const span=el('span'); span.textContent=msg; t.appendChild(span);
  const btn=el('button','toast-undo'); btn.textContent='취소';
  btn.onclick=()=>{ (onUndo||undo)(); t.classList.remove('show'); clearTimeout(toastT); };
  t.appendChild(btn);
  clearTimeout(toastT); toastT=setTimeout(()=>{ t.classList.remove('show'); },5000);   // 넉넉히 5초
}

/* 키보드 단축키 */
addEventListener('keydown',e=>{
  if($('#editor').classList.contains('hidden'))return;
  if(tedit)return;
  const m=e.metaKey||e.ctrlKey;
  if(m&&e.key==='z'){ e.preventDefault(); e.shiftKey?redo():undo(); }
  else if(m&&e.key==='y'){ e.preventDefault(); redo(); }
  else if(e.key==='ArrowRight'&&!m){ if(pi<nb.pages.length-1)gotoPage(pi+1); }
  else if(e.key==='ArrowLeft'&&!m){ if(pi>0)gotoPage(pi-1); }
  else if(e.key==='Backspace'&&selection){ const arr=selection.strokes.slice(); page.strokes=page.strokes.filter(s=>!arr.includes(s)); pushUndo({t:'erase',strokes:arr}); clearSelection(); }
  else if('123456789'.includes(e.key)&&!m){ const map={'1':'pen','2':'ballpen','3':'highlighter','4':'glow','5':'eraser','6':'shape','7':'lasso','8':'text','9':'pan'}; setTool(map[e.key]); }
});

addEventListener('resize',()=>{ if(!$('#editor').classList.contains('hidden')){ scheduleRender(); } });
addEventListener('beforeunload',saveNow);

/* ============================ 시작 ============================ */
// IndexedDB에서 노트를 불러온 뒤 서재 표시 (db 객체가 교체되므로 설정도 다시 적용)
initStorage().catch(()=>{}).then(()=>{
  applyTheme(db.theme || (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));
  fingerDraw = db.fingerDraw===true;
  openTabs = Array.isArray(db.openTabs)? db.openTabs.slice() : [];
  renderLibrary();
});

/* ============================ 앱 설치(PWA) — 오프라인 실행 ============================ */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

/* 홈 화면 설치 버튼 */
(function(){
  const btn=$('#installBtn'), sheet=$('#iosSheet');
  const isStandalone = matchMedia('(display-mode: standalone)').matches || navigator.standalone===true;
  const ua=navigator.userAgent||'';
  const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
  let deferred=null;

  function showBtn(){ btn.classList.remove('hidden'); }
  function hideBtn(){ btn.classList.add('hidden'); }

  // 이미 앱으로 설치·실행 중이면 버튼 숨김
  if(isStandalone){ hideBtn(); }

  // Android/데스크톱 Chrome: 설치 프롬프트 캡처
  addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferred=e; if(!isStandalone) showBtn(); });
  addEventListener('appinstalled',()=>{ deferred=null; hideBtn(); });

  // iOS Safari는 beforeinstallprompt가 없으므로 안내 시트로 대체
  if(isIOS && !isStandalone){ showBtn(); }

  btn?.addEventListener('click', async ()=>{
    if(deferred){ deferred.prompt(); const r=await deferred.userChoice.catch(()=>null); deferred=null; if(r&&r.outcome==='accepted') hideBtn(); }
    else if(isIOS){ sheet.classList.add('show'); }
    else { sheet.classList.add('show'); } // 그 외 브라우저도 수동 안내
  });
  $('#iosOk')?.addEventListener('click',()=>sheet.classList.remove('show'));
  sheet?.addEventListener('click',e=>{ if(e.target===sheet) sheet.classList.remove('show'); });
})();
</script>
